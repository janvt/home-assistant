  - file: mdi:record
    id: vinyl_icon
    resize: 36x36
    type: BINARY
    transparency: chroma_key
  - file: mdi:candle
    id: chill_icon
    resize: 36x36
    type: BINARY
    transparency: chroma_key

interval:
  - interval: 1s
    then:
      - lambda: |-
          id(inactivity_time) += 1;

          if (id(auto_lock).state) {
            if (id(inactivity_time) > id(screen_saver_time).state && id(inactivity_time) < id(auto_lock_time_out).state ) {
                id(screen_saver).turn_on();
            }
            if (id(inactivity_time) > id(auto_lock_time_out).state) {
                id(backlight_pwm).turn_off();
                id(dial_display).turn_off();
                id(screen_saver).turn_off();
            }
          }

          else {
            if (id(inactivity_time) > id(screen_saver_time).state) {
                id(screen_saver).turn_on();
            }
          }

light:
  - platform: monochromatic
    name: "Backlight"
    output: backlight_pwm
    id: backlight
    default_transition_length: 0s
    restore_mode: ALWAYS_ON
    internal: True

number:
  - platform: template
    name: "Auto Lock"
    id: auto_lock_time_out
    icon: "mdi:timer-sand"
    optimistic: true
    min_value: 20
    max_value: 300
    step: 10
    unit_of_measurement: "s"
    restore_value: true
  - platform: template
    name: "Screen Saver"
    id: screen_saver_time
    icon: "mdi:screen-rotation-lock"
    optimistic: true
    min_value: 10
    max_value: 300
    step: 10
    unit_of_measurement: "s"
    restore_value: true

output:
  - platform: ledc
    pin: GPIO3
    id: buzzer
  - platform: ledc
    pin: GPIO9
    id: backlight_pwm

sensor:
  - platform: rotary_encoder
    id: encoder
    pin_a: GPIO40
    pin_b: GPIO41
    on_clockwise:
      then:
        - if:
            condition:
              display.is_displaying_page: locked_screen
            then:
              - switch.turn_on: dial_display
              - light.turn_on:
                  id: backlight
                  brightness: 100%
              - display.page.show: volume_control
        - if:
            condition:
              display.is_displaying_page: volume_control
            then:
              - lambda: |-
                  id(volume_level) = std::min(1.0f, id(volume_level) + 0.02f);
              - homeassistant.action:
                  service: media_player.volume_set
                  data:
                    entity_id: ${media_player}
                  data_template:
                    volume_level: '{{ my_variable | float }}'
                  variables:
                    my_variable: |-
                      return id(volume_level);
        - if:
            condition:
              display.is_displaying_page: volume_control_2
            then:
              - lambda: |-
                  id(volume_level_2) = std::min(1.0f, id(volume_level_2) + 0.02f);
              - homeassistant.action:
                  service: media_player.volume_set
                  data:
                    entity_id: ${media_player_2}
                  data_template:
                    volume_level: '{{ my_variable | float }}'
                  variables:
                    my_variable: |-
                      return id(volume_level_2);
        - if:
            condition:
              display.is_displaying_page: eq_control
            then:
              - lambda: |-
                  id(bass_level) = std::min(12.0f, id(bass_level) + 1.0f);
              - homeassistant.action:
                  service: number.set_value
                  data:
                    entity_id: ${bass_entity}
                  data_template:
                    value: '{{ my_variable | float }}'
                  variables:
                    my_variable: |-
                      return id(bass_level);
        - if:
            condition:
              display.is_displaying_page: light_control
            then:
              - lambda: |-
                  id(light_brightness) = std::min(1.0f, id(light_brightness) + 0.02f);
              - homeassistant.action:
                  service: light.turn_on
                  data:
                    entity_id: ${light_entity}
                  data_template:
                    brightness_pct: '{{ my_variable | int }}'
                  variables:
                    my_variable: |-
                      return (int)(id(light_brightness) * 100);
        - lambda: |-
            id(inactivity_time) = 0;
    on_anticlockwise:
      then:
        - if:
            condition:
              display.is_displaying_page: locked_screen
            then:
              - switch.turn_on: dial_display
              - light.turn_on:
                  id: backlight
                  brightness: 100%
              - display.page.show: volume_control
        - if:
            condition:
              display.is_displaying_page: volume_control
            then:
              - lambda: |-
                  id(volume_level) = std::max(0.0f, id(volume_level) - 0.02f);
              - homeassistant.action:
                  service: media_player.volume_set
                  data:
                    entity_id: ${media_player}
                  data_template:
                    volume_level: '{{ my_variable | float }}'
                  variables:
                    my_variable: |-
                      return id(volume_level);
        - if:
            condition:
              display.is_displaying_page: volume_control_2
            then:
              - lambda: |-
                  id(volume_level_2) = std::max(0.0f, id(volume_level_2) - 0.02f);
              - homeassistant.action:
                  service: media_player.volume_set
                  data:
                    entity_id: ${media_player_2}
                  data_template:
                    volume_level: '{{ my_variable | float }}'
                  variables:
                    my_variable: |-
                      return id(volume_level_2);
        - if:
            condition:
              display.is_displaying_page: eq_control
            then:
              - lambda: |-
                  id(bass_level) = std::max(-12.0f, id(bass_level) - 1.0f);
              - homeassistant.action:
                  service: number.set_value
                  data:
                    entity_id: ${bass_entity}
                  data_template:
                    value: '{{ my_variable | float }}'
                  variables:
                    my_variable: |-
                      return id(bass_level);
        - if:
            condition:
              display.is_displaying_page: light_control
            then:
              - lambda: |-
                  id(light_brightness) = std::max(0.0f, id(light_brightness) - 0.02f);
              - homeassistant.action:
                  service: light.turn_on
                  data:
                    entity_id: ${light_entity}
                  data_template:
                    brightness_pct: '{{ my_variable | int }}'
                  variables:
                    my_variable: |-
                      return (int)(id(light_brightness) * 100);
        - lambda: |-
            id(inactivity_time) = 0;

  - platform: homeassistant
    id: media_player_volume
    entity_id: ${media_player}
    attribute: volume_level
    internal: true
    filters:
      - lambda: |-
          if (isnan(x)) { return 0; }
          else { return x; }
    on_value:
      then:
        - lambda: |-
            id(volume_level) = x;

  - platform: homeassistant
    id: media_player_volume_2
    entity_id: ${media_player_2}
    attribute: volume_level
    internal: true
    filters:
      - lambda: |-
          if (isnan(x)) { return 0; }
          else { return x; }
    on_value:
      then:
        - lambda: |-
            id(volume_level_2) = x;

  - platform: homeassistant
    id: bass_value
    entity_id: ${bass_entity}
    internal: true
    filters:
      - lambda: |-
          if (isnan(x)) { return 0; }
          else { return x; }
    on_value:
      then:
        - lambda: |-
            id(bass_level) = x;


  - platform: homeassistant
    id: light_brightness_ha
    entity_id: ${light_entity}
    attribute: brightness
    internal: true
    filters:
      - lambda: |-
          if (isnan(x)) { return 0; }
          else { return x / 255.0; }
    on_value:
      then:
        - lambda: |-
            id(light_brightness) = x;

spi:
  id: spi_bus
  mosi_pin: GPIO5
  clk_pin: GPIO6

switch:
  - platform: template
    name: "Auto Lock"
    id: auto_lock
    icon: "mdi:lock-clock"
    optimistic: true
    restore_mode: 'restore_default_off'
  - platform: template
    name: "Display"
    id: dial_display
    icon: "mdi:fit-to-screen"
    optimistic: true
    restore_mode: 'always_on'
    on_turn_on:
      - light.turn_on:
          id: backlight
          brightness: 100%
      - lambda: |-
          id(inactivity_time) = 0;
    on_turn_off:
      - light.turn_off: backlight
      - display.page.show: volume_control
  - platform: template
    name: "Screen Saver"
    id: screen_saver
    icon: "mdi:screen-rotation-lock"
    optimistic: true
    restore_mode: 'always_off'
    internal: true
    on_turn_on:
      - light.turn_on:
          id: backlight
          brightness: 50%
      - display.page.show: locked_screen

  - platform: template
    name: "Flip Screen"
    id: flip_screen
    icon: "mdi:screen-rotation"
    optimistic: true
    restore_mode: 'restore_default_off'
    on_turn_on:
      - lambda: |-
          id(round_display).set_rotation(display::DISPLAY_ROTATION_180_DEGREES);
    on_turn_off:
      - lambda: |-
          id(round_display).set_rotation(display::DISPLAY_ROTATION_0_DEGREES);

text_sensor:
  - platform: homeassistant
    id: media_player_state
    entity_id: ${media_player}
    internal: true
  - platform: homeassistant
    id: media_player_muted
    entity_id: ${media_player}
    attribute: is_volume_muted
    internal: true
  - platform: homeassistant
    id: media_player_title
    entity_id: ${media_player}
    attribute: media_title
    internal: true
  - platform: homeassistant
    id: media_player_artist
    entity_id: ${media_player}
    attribute: media_artist
    internal: true
  - platform: homeassistant
    id: media_player_state_2
    entity_id: ${media_player_2}
    internal: true
  - platform: homeassistant
    id: media_player_muted_2
    entity_id: ${media_player_2}
    attribute: is_volume_muted
    internal: true
  - platform: homeassistant
    id: media_player_title_2
    entity_id: ${media_player_2}
    attribute: media_title
    internal: true
  - platform: homeassistant
    id: media_player_artist_2
    entity_id: ${media_player_2}
    attribute: media_artist
    internal: true
  - platform: homeassistant
    id: light_state
    entity_id: ${light_entity}
    internal: true
  - platform: homeassistant
    id: media_player_source
    entity_id: ${media_player}
    attribute: source
    internal: true
  - platform: homeassistant
    id: media_player_group_members
    entity_id: ${media_player}
    attribute: group_members
    internal: true

time:
  # RTC
  - platform: pcf8563
    id: rtctime
    i2c_id: internal_i2c
    address: 0x51
    update_interval: never
  - platform: homeassistant
    id: esptime
    on_time_sync:
      then:
        - pcf8563.write_time:

touchscreen:
  - platform: ft5x06
    id: touchscreen_dial
    i2c_id: internal_i2c
    address: 0x38

display:
  - platform: mipi_spi
    id: round_display
    model: GC9A01A
    cs_pin: GPIO7
    reset_pin: GPIO8
    update_interval: 1s
    data_rate: 80MHz
    dc_pin: GPIO4
    invert_colors: true
    buffer_size: 100%
    pages:
      - id: locked_screen
        lambda: |-
          it.fill(id(background_color));
          auto now = id(esptime).now();
          if (now.is_valid()) {
            it.strftime(120, 100, id(volume_font), id(color_white), TextAlign::CENTER, "%H:%M", now);
            it.strftime(120, 150, id(secondary), id(color_dim), TextAlign::CENTER, "%d/%m/%y", now);
          }

      - id: volume_control
        lambda: |-
          it.fill(id(background_color));

          int vol_pct = (int)(id(volume_level) * 100);
          bool is_muted = id(media_player_muted).has_state() &&
            (id(media_player_muted).state == "True" || id(media_player_muted).state == "true" || id(media_player_muted).state == "on");

          if (is_muted) {
            it.image(100, 55, id(mute_icon), id(color_muted));
          } else {
            it.image(100, 55, id(speaker_icon), id(color_accent));
          }

          // Page label
          it.printf(120, 40, id(small_font), id(color_dim), TextAlign::CENTER, "Living Room");

          if (is_muted) {
            it.printf(120, 125, id(volume_font), id(color_muted), TextAlign::CENTER, "MUTE");
          } else {
            it.printf(120, 125, id(volume_font), id(color_white), TextAlign::CENTER, "%d%%", vol_pct);
          }

          // Volume arc
          float angle_start = 150.0;
          float angle_range = 240.0;
          float vol_angle = angle_start + (angle_range * id(volume_level));
          for (float a = angle_start; a < angle_start + angle_range; a += 3.0) {
            float rad = a * 3.14159 / 180.0;
            float cos_a = cos(rad);
            float sin_a = sin(rad);
            auto color = (a < vol_angle && !is_muted) ? id(color_accent) : id(color_arc_bg);
            for (int r = 104; r <= 108; r++) {
              it.draw_pixel_at(120 + (int)(r * cos_a), 120 + (int)(r * sin_a), color);
            }
          }

          // Media info
          if (id(media_player_state).has_state()) {
            std::string state = id(media_player_state).state;
            if (state == "playing") {
              it.image(105, 160, id(play_icon), id(color_playing));
            } else if (state == "paused") {
              it.image(105, 160, id(pause_icon), id(color_dim));
            }
          }

          if (id(media_player_title).has_state() && id(media_player_title).state.length() > 0) {
            std::string title = id(media_player_title).state;
            if (title.length() > 20) title = title.substr(0, 18) + "..";
            it.printf(120, 200, id(small_font), id(color_white), TextAlign::CENTER, "%s", title.c_str());
          }
          if (id(media_player_artist).has_state() && id(media_player_artist).state.length() > 0) {
            std::string artist = id(media_player_artist).state;
            if (artist.length() > 22) artist = artist.substr(0, 20) + "..";
            it.printf(120, 215, id(small_font), id(color_dim), TextAlign::CENTER, "%s", artist.c_str());
          }

          // Page dots (5 pages, current_page = 0)
          for (int i = 0; i < 5; i++) {
            int dx = 102 + i * 10 - 1;
            auto dot_color = (i == id(current_page)) ? id(color_accent) : id(color_dim);
            it.filled_circle(dx, 232, 3, dot_color);
          }

          // Navigation chevrons
          it.image(20, 108, id(chevron_left_icon), id(color_dim));
          it.image(196, 108, id(chevron_right_icon), id(color_dim));

      - id: volume_control_2
        lambda: |-
          it.fill(id(background_color));

          int vol_pct = (int)(id(volume_level_2) * 100);
          bool is_muted = id(media_player_muted_2).has_state() &&
            (id(media_player_muted_2).state == "True" || id(media_player_muted_2).state == "true" || id(media_player_muted_2).state == "on");

          if (is_muted) {
            it.image(100, 55, id(mute_icon), id(color_muted));
          } else {
            it.image(100, 55, id(speaker_icon), id(color_accent));
          }

          it.printf(120, 40, id(small_font), id(color_dim), TextAlign::CENTER, "Madagascar");

          if (is_muted) {
            it.printf(120, 125, id(volume_font), id(color_muted), TextAlign::CENTER, "MUTE");
          } else {
            it.printf(120, 125, id(volume_font), id(color_white), TextAlign::CENTER, "%d%%", vol_pct);
          }

          // Volume arc
          float angle_start = 150.0;
          float angle_range = 240.0;
          float vol_angle = angle_start + (angle_range * id(volume_level_2));
          for (float a = angle_start; a < angle_start + angle_range; a += 3.0) {
            float rad = a * 3.14159 / 180.0;
            float cos_a = cos(rad);
            float sin_a = sin(rad);
            auto color = (a < vol_angle && !is_muted) ? id(color_accent) : id(color_arc_bg);
            for (int r = 104; r <= 108; r++) {
              it.draw_pixel_at(120 + (int)(r * cos_a), 120 + (int)(r * sin_a), color);
            }
          }

          // Media info
          if (id(media_player_state_2).has_state()) {
            std::string state = id(media_player_state_2).state;
            if (state == "playing") {
              it.image(105, 160, id(play_icon), id(color_playing));
            } else if (state == "paused") {
              it.image(105, 160, id(pause_icon), id(color_dim));
            }
          }

          if (id(media_player_title_2).has_state() && id(media_player_title_2).state.length() > 0) {
            std::string title = id(media_player_title_2).state;
            if (title.length() > 20) title = title.substr(0, 18) + "..";
            it.printf(120, 200, id(small_font), id(color_white), TextAlign::CENTER, "%s", title.c_str());
          }
          if (id(media_player_artist_2).has_state() && id(media_player_artist_2).state.length() > 0) {
            std::string artist = id(media_player_artist_2).state;
            if (artist.length() > 22) artist = artist.substr(0, 20) + "..";
            it.printf(120, 215, id(small_font), id(color_dim), TextAlign::CENTER, "%s", artist.c_str());
          }

          // Page dots
          for (int i = 0; i < 5; i++) {
            int dx = 102 + i * 10 - 1;
            auto dot_color = (i == id(current_page)) ? id(color_accent) : id(color_dim);
            it.filled_circle(dx, 232, 3, dot_color);
          }

          // Navigation chevrons
          it.image(20, 108, id(chevron_left_icon), id(color_dim));
          it.image(196, 108, id(chevron_right_icon), id(color_dim));

      - id: eq_control
        lambda: |-
          it.fill(id(background_color));

          it.image(100, 55, id(eq_icon), id(color_eq));

          it.printf(120, 40, id(small_font), id(color_dim), TextAlign::CENTER, "Bass");
          it.printf(120, 125, id(volume_font), id(color_white), TextAlign::CENTER, "%.0f", id(bass_level));

          // Bass arc (-12 to +12 range)
          float angle_start = 150.0;
          float angle_range = 240.0;
          float eq_angle = angle_start + (angle_range * ((id(bass_level) + 12.0f) / 24.0f));
          for (float a = angle_start; a < angle_start + angle_range; a += 3.0) {
            float rad = a * 3.14159 / 180.0;
            float cos_a = cos(rad);
            float sin_a = sin(rad);
            auto color = (a < eq_angle) ? id(color_eq) : id(color_arc_bg);
            for (int r = 104; r <= 108; r++) {
              it.draw_pixel_at(120 + (int)(r * cos_a), 120 + (int)(r * sin_a), color);
            }
          }


          // Page dots
          for (int i = 0; i < 5; i++) {
            int dx = 102 + i * 10 - 1;
            auto dot_color = (i == id(current_page)) ? id(color_eq) : id(color_dim);
            it.filled_circle(dx, 232, 3, dot_color);
          }

          // Navigation chevrons
          it.image(20, 108, id(chevron_left_icon), id(color_dim));
          it.image(196, 108, id(chevron_right_icon), id(color_dim));

      - id: light_control
        lambda: |-
          it.fill(id(background_color));

          bool is_on = id(light_state).has_state() && id(light_state).state == "on";
          int bright_pct = (int)(id(light_brightness) * 100);

          if (is_on) {
            it.image(100, 55, id(light_icon), id(color_warm));
          } else {
            it.image(100, 55, id(light_off_icon), id(color_dim));
          }

          it.printf(120, 40, id(small_font), id(color_dim), TextAlign::CENTER, "Light");

          if (is_on) {
            it.printf(120, 125, id(volume_font), id(color_white), TextAlign::CENTER, "%d%%", bright_pct);
          } else {
            it.printf(120, 125, id(volume_font), id(color_dim), TextAlign::CENTER, "OFF");
          }

          // Brightness arc
          float angle_start = 150.0;
          float angle_range = 240.0;
          float bright_angle = angle_start + (angle_range * id(light_brightness));
          for (float a = angle_start; a < angle_start + angle_range; a += 3.0) {
            float rad = a * 3.14159 / 180.0;
            float cos_a = cos(rad);
            float sin_a = sin(rad);
            auto color = (a < bright_angle && is_on) ? id(color_warm) : id(color_arc_bg);
            for (int r = 104; r <= 108; r++) {
              it.draw_pixel_at(120 + (int)(r * cos_a), 120 + (int)(r * sin_a), color);
            }
          }

          it.printf(120, 200, id(small_font), id(color_dim), TextAlign::CENTER, "Press to toggle");

          // Page dots
          for (int i = 0; i < 5; i++) {
            int dx = 102 + i * 10 - 1;
            auto dot_color = (i == id(current_page)) ? id(color_warm) : id(color_dim);
            it.filled_circle(dx, 232, 3, dot_color);
          }

          // Navigation chevrons
          it.image(20, 108, id(chevron_left_icon), id(color_dim));
          it.image(196, 108, id(chevron_right_icon), id(color_dim));

      - id: actions_screen
        lambda: |-
          it.fill(id(background_color));

          // Page title
          it.printf(120, 25, id(small_font), id(color_dim), TextAlign::CENTER, "Actions");

          // Top-left: Line In / TV toggle  (center of left column: x=95)
          {
            bool on_line_in = id(media_player_source).has_state() && id(media_player_source).state == "${line_in_source}";
            bool on_tv = id(media_player_source).has_state() && id(media_player_source).state == "${tv_source}";
            auto tl_color = (id(actions_last_tapped) == 0) ? id(color_warm) :
                            (on_line_in ? id(color_warm) : (on_tv ? id(color_accent) : id(color_dim)));
            it.image(67, 55, id(line_in_icon), tl_color);
            it.printf(85, 97, id(small_font), tl_color, TextAlign::CENTER, on_tv ? "TV" : "${line_in_select}");
          }

          // Top-right: Group toggle  (center of right column: x=145)
          {
            bool is_grouped = id(media_player_group_members).has_state() &&
                id(media_player_group_members).state.find("${media_player_2}") != std::string::npos;
            auto tr_color = (id(actions_last_tapped) == 1) ? id(color_playing) :
                            (is_grouped ? id(color_playing) : id(color_dim));
            it.image(137, 55, id(group_icon), tr_color);
            it.printf(155, 97, id(small_font), tr_color, TextAlign::CENTER, is_grouped ? "Ungroup" : "Group");
          }

          // Bottom-left: Vinyl (purple)  (x=95)
          {
            auto bl_color = (id(actions_last_tapped) == 2) ? id(color_eq) : id(color_dim);
            it.image(67, 135, id(vinyl_icon), bl_color);
            it.printf(85, 177, id(small_font), bl_color, TextAlign::CENTER, "Vinyl");
          }

          // Bottom-right: Chill (blue)  (x=145)
          {
            auto br_color = (id(actions_last_tapped) == 3) ? id(color_accent) : id(color_dim);
            it.image(137, 135, id(chill_icon), br_color);
            it.printf(155, 177, id(small_font), br_color, TextAlign::CENTER, "Chill");
          }

          // Page dots (5 pages, current_page = 4)
          for (int i = 0; i < 5; i++) {
            int dx = 102 + i * 10 - 1;
            auto dot_color = (i == id(current_page)) ? id(color_white) : id(color_dim);
            it.filled_circle(dx, 232, 3, dot_color);
          }

          // Navigation chevrons
          it.image(20, 108, id(chevron_left_icon), id(color_dim));
          it.image(196, 108, id(chevron_right_icon), id(color_dim));
