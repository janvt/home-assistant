substitutions:

  # Device customization
  name: m5stack-dial-volume
  friendly_name: M5Stack Dial Volume
  background_color: '1a1a2e'

  # Media player entities to control
  media_player: media_player.living_room
  media_player_2: media_player.unnamed_room

  # Bass/EQ control (number entity exposed by your media player integration)
  bass_entity: number.living_room_sub_gain

  # Light entity to control
  light_entity: light.reading_spot

  # Icons
  icon_speaker: mdi:speaker
  icon_mute: mdi:volume-mute

  # Sounds
  menu_sound: 'beep:d=32,o=5,b=255:c5'

  # Other settings
  allowed_characters: " ¿?¡!#%'()+,-./:°0123456789ABCDEFGHIJKLMNOPQRSTUVWYZabcdefghijklmnopqrstuvwxyzáéíóú"

################################################################################################################


esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  on_boot:
    then:
      - delay: 500ms
      - pcf8563.read_time:
      - light.turn_on:
          id: backlight
          brightness: 100%
      - lambda: |-
          if (id(flip_screen).state) {
            id(round_display).set_rotation(display::DISPLAY_ROTATION_180_DEGREES);
          }
      - display.page.show: volume_control
  platformio_options:
    board_build.flash_mode: dio


esp32:
  board: esp32-s3-devkitc-1
  flash_size: 8MB
  framework:
    type: esp-idf


wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  manual_ip:
    static_ip: 10.69.43.33
    gateway: 10.69.43.1
    subnet: 255.255.255.0

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "M5Stack-Dial-Volume Fallback"
    password: !secret m5fallbackpassword

api:
  encryption:
    key: !secret m5dialencryption

ota:
  - platform: esphome

logger:

captive_portal:

binary_sensor:
  - platform: gpio
    name: "Front Button"
    id: front_button
    pin:
      number: GPIO42
      inverted: true
    internal: true
    on_press:
      then:
        - if:
            condition:
              switch.is_on: menu_sounds
            then:
              - rtttl.play: ${menu_sound}
        - if:
            condition:
              light.is_on: backlight
            then:
              - if:
                  condition:
                    display.is_displaying_page: locked_screen
                  then:
                    - switch.turn_on: dial_display
                    - light.turn_on:
                        id: backlight
                        brightness: 100%
                    - lambda: |-
                        // Show the page matching current_page
                        switch(id(current_page)) {
                          case 0: id(round_display).show_page(id(volume_control)); break;
                          case 1: id(round_display).show_page(id(volume_control_2)); break;
                          case 2: id(round_display).show_page(id(eq_control)); break;
                          case 3: id(round_display).show_page(id(light_control)); break;
                        }
                  else:
                    - if:
                        condition:
                          display.is_displaying_page: volume_control
                        then:
                          - homeassistant.action:
                              service: media_player.volume_mute
                              data:
                                entity_id: ${media_player}
                                is_volume_muted: !lambda 'return !(id(media_player_muted).state == "on");'
                    - if:
                        condition:
                          display.is_displaying_page: volume_control_2
                        then:
                          - homeassistant.action:
                              service: media_player.volume_mute
                              data:
                                entity_id: ${media_player_2}
                                is_volume_muted: !lambda 'return !(id(media_player_muted_2).state == "on");'
                    - if:
                        condition:
                          display.is_displaying_page: light_control
                        then:
                          - homeassistant.action:
                              service: light.toggle
                              data:
                                entity_id: ${light_entity}
            else:
              - switch.turn_on: dial_display
              - light.turn_on:
                  id: backlight
                  brightness: 100%
              - lambda: |-
                  switch(id(current_page)) {
                    case 0: id(round_display).show_page(id(volume_control)); break;
                    case 1: id(round_display).show_page(id(volume_control_2)); break;
                    case 2: id(round_display).show_page(id(eq_control)); break;
                    case 3: id(round_display).show_page(id(light_control)); break;
                  }
        - lambda: |-
            id(inactivity_time) = 0;

    on_double_click:
      then:
        # Play/Pause toggle for the active media player
        - if:
            condition:
              display.is_displaying_page: volume_control
            then:
              - homeassistant.action:
                  service: media_player.media_play_pause
                  data:
                    entity_id: ${media_player}
        - if:
            condition:
              display.is_displaying_page: volume_control_2
            then:
              - homeassistant.action:
                  service: media_player.media_play_pause
                  data:
                    entity_id: ${media_player_2}
        - lambda: |-
            id(inactivity_time) = 0;

  - platform: gpio
    name: Hold Button
    pin: GPIO46
    internal: True

  # Touch zones for page navigation (left/right edges of screen)
  - platform: touchscreen
    touchscreen_id: touchscreen_dial
    name: "Nav Left"
    id: nav_left
    internal: true
    x_min: 0
    x_max: 70
    y_min: 20
    y_max: 220
    on_press:
      then:
        - lambda: |-
            int total_pages = 4;
            id(current_page) = (id(current_page) - 1 + total_pages) % total_pages;
            switch(id(current_page)) {
              case 0: id(round_display).show_page(id(volume_control)); break;
              case 1: id(round_display).show_page(id(volume_control_2)); break;
              case 2: id(round_display).show_page(id(eq_control)); break;
              case 3: id(round_display).show_page(id(light_control)); break;
            }
            id(inactivity_time) = 0;
        - if:
            condition:
              switch.is_on: menu_sounds
            then:
              - rtttl.play: ${menu_sound}

  - platform: touchscreen
    touchscreen_id: touchscreen_dial
    name: "Nav Right"
    id: nav_right
    internal: true
    x_min: 170
    x_max: 240
    y_min: 20
    y_max: 220
    on_press:
      then:
        - lambda: |-
            int total_pages = 4;
            id(current_page) = (id(current_page) + 1) % total_pages;
            switch(id(current_page)) {
              case 0: id(round_display).show_page(id(volume_control)); break;
              case 1: id(round_display).show_page(id(volume_control_2)); break;
              case 2: id(round_display).show_page(id(eq_control)); break;
              case 3: id(round_display).show_page(id(light_control)); break;
            }
            id(inactivity_time) = 0;
        - if:
            condition:
              switch.is_on: menu_sounds
            then:
              - rtttl.play: ${menu_sound}

color:
  - id: background_color
    hex: ${background_color}
  - id: color_white
    hex: 'ffffff'
  - id: color_dim
    hex: '666666'
  - id: color_accent
    hex: '4fc3f7'
  - id: color_muted
    hex: '800020'
  - id: color_playing
    hex: '69f0ae'
  - id: color_arc_bg
    hex: '333355'
  - id: color_warm
    hex: 'ffb74d'
  - id: color_eq
    hex: 'ab47bc'

font:
  - file: "gfonts://Space Grotesk"
    id: volume_font
    size: 50
    glyphs: ${allowed_characters}
  - file: "gfonts://Space Grotesk"
    id: secondary
    size: 18
    glyphs: ${allowed_characters}
  - file: "gfonts://Space Grotesk"
    id: small_font
    size: 14
    glyphs: ${allowed_characters}

globals:
  - id: inactivity_time
    type: int
    restore_value: no
    initial_value: '0'
  - id: volume_level
    type: float
    restore_value: no
    initial_value: '0.0'
  - id: volume_level_2
    type: float
    restore_value: no
    initial_value: '0.0'
  - id: bass_level
    type: float
    restore_value: no
    initial_value: '0.0'
  - id: light_brightness
    type: float
    restore_value: no
    initial_value: '0.0'
  - id: current_page
    type: int
    restore_value: no
    initial_value: '0'

i2c:
  - id: internal_i2c
    sda: GPIO11
    scl: GPIO12
    scan: False

image:
  - file: ${icon_speaker}
    id: speaker_icon
    resize: 40x40
    type: BINARY
    transparency: chroma_key
  - file: ${icon_mute}
    id: mute_icon
    resize: 40x40
    type: BINARY
    transparency: chroma_key
  - file: mdi:volume-plus
    id: vol_plus_icon
    resize: 30x30
    type: BINARY
    transparency: chroma_key
  - file: mdi:volume-minus
    id: vol_minus_icon
    resize: 30x30
    type: BINARY
    transparency: chroma_key
  - file: mdi:play
    id: play_icon
    resize: 30x30
    type: BINARY
    transparency: chroma_key
  - file: mdi:pause
    id: pause_icon
    resize: 30x30
    type: BINARY
    transparency: chroma_key
  - file: mdi:equalizer
    id: eq_icon
    resize: 40x40
    type: BINARY
    transparency: chroma_key
  - file: mdi:lightbulb
    id: light_icon
    resize: 40x40
    type: BINARY
    transparency: chroma_key
  - file: mdi:lightbulb-off
    id: light_off_icon
    resize: 40x40
    type: BINARY
    transparency: chroma_key
  - file: mdi:chevron-left
    id: chevron_left_icon
    resize: 24x24
    type: BINARY
    transparency: chroma_key
  - file: mdi:chevron-right
    id: chevron_right_icon
    resize: 24x24
    type: BINARY
    transparency: chroma_key

interval:
  - interval: 1s
    then:
      - lambda: |-
          id(inactivity_time) += 1;

          if (id(auto_lock).state) {
            if (id(inactivity_time) > id(screen_saver_time).state && id(inactivity_time) < id(auto_lock_time_out).state ) {
                id(screen_saver).turn_on();
            }
            if (id(inactivity_time) > id(auto_lock_time_out).state) {
                id(backlight_pwm).turn_off();
                id(dial_display).turn_off();
                id(screen_saver).turn_off();
            }
          }

          else {
            if (id(inactivity_time) > id(screen_saver_time).state) {
                id(screen_saver).turn_on();
            }
          }

light:
  - platform: monochromatic
    name: "Backlight"
    output: backlight_pwm
    id: backlight
    default_transition_length: 0s
    restore_mode: ALWAYS_ON
    internal: True

number:
  - platform: template
    name: "Auto Lock"
    id: auto_lock_time_out
    icon: "mdi:timer-sand"
    optimistic: true
    min_value: 20
    max_value: 300
    step: 10
    unit_of_measurement: "s"
    restore_value: true
  - platform: template
    name: "Screen Saver"
    id: screen_saver_time
    icon: "mdi:screen-rotation-lock"
    optimistic: true
    min_value: 10
    max_value: 300
    step: 10
    unit_of_measurement: "s"
    restore_value: true

output:
  - platform: ledc
    pin: GPIO3
    id: buzzer
  - platform: ledc
    pin: GPIO9
    id: backlight_pwm

rtttl:
  id: buzzer_rtttl
  output: buzzer

sensor:
  - platform: rotary_encoder
    id: encoder
    pin_a: GPIO40
    pin_b: GPIO41
    on_clockwise:
      then:
        - if:
            condition:
              switch.is_on: menu_sounds
            then:
              - rtttl.play: ${menu_sound}
        - if:
            condition:
              display.is_displaying_page: locked_screen
            then:
              - switch.turn_on: dial_display
              - light.turn_on:
                  id: backlight
                  brightness: 100%
              - display.page.show: volume_control
        - if:
            condition:
              display.is_displaying_page: volume_control
            then:
              - lambda: |-
                  id(volume_level) = std::min(1.0f, id(volume_level) + 0.02f);
              - homeassistant.action:
                  service: media_player.volume_set
                  data:
                    entity_id: ${media_player}
                  data_template:
                    volume_level: '{{ my_variable | float }}'
                  variables:
                    my_variable: |-
                      return id(volume_level);
        - if:
            condition:
              display.is_displaying_page: volume_control_2
            then:
              - lambda: |-
                  id(volume_level_2) = std::min(1.0f, id(volume_level_2) + 0.02f);
              - homeassistant.action:
                  service: media_player.volume_set
                  data:
                    entity_id: ${media_player_2}
                  data_template:
                    volume_level: '{{ my_variable | float }}'
                  variables:
                    my_variable: |-
                      return id(volume_level_2);
        - if:
            condition:
              display.is_displaying_page: eq_control
            then:
              - lambda: |-
                  id(bass_level) = std::min(12.0f, id(bass_level) + 1.0f);
              - homeassistant.action:
                  service: number.set_value
                  data:
                    entity_id: ${bass_entity}
                  data_template:
                    value: '{{ my_variable | float }}'
                  variables:
                    my_variable: |-
                      return id(bass_level);
        - if:
            condition:
              display.is_displaying_page: light_control
            then:
              - lambda: |-
                  id(light_brightness) = std::min(1.0f, id(light_brightness) + 0.02f);
              - homeassistant.action:
                  service: light.turn_on
                  data:
                    entity_id: ${light_entity}
                  data_template:
                    brightness_pct: '{{ my_variable | int }}'
                  variables:
                    my_variable: |-
                      return (int)(id(light_brightness) * 100);
        - lambda: |-
            id(inactivity_time) = 0;
    on_anticlockwise:
      then:
        - if:
            condition:
              switch.is_on: menu_sounds
            then:
              - rtttl.play: ${menu_sound}
        - if:
            condition:
              display.is_displaying_page: locked_screen
            then:
              - switch.turn_on: dial_display
              - light.turn_on:
                  id: backlight
                  brightness: 100%
              - display.page.show: volume_control
        - if:
            condition:
              display.is_displaying_page: volume_control
            then:
              - lambda: |-
                  id(volume_level) = std::max(0.0f, id(volume_level) - 0.02f);
              - homeassistant.action:
                  service: media_player.volume_set
                  data:
                    entity_id: ${media_player}
                  data_template:
                    volume_level: '{{ my_variable | float }}'
                  variables:
                    my_variable: |-
                      return id(volume_level);
        - if:
            condition:
              display.is_displaying_page: volume_control_2
            then:
              - lambda: |-
                  id(volume_level_2) = std::max(0.0f, id(volume_level_2) - 0.02f);
              - homeassistant.action:
                  service: media_player.volume_set
                  data:
                    entity_id: ${media_player_2}
                  data_template:
                    volume_level: '{{ my_variable | float }}'
                  variables:
                    my_variable: |-
                      return id(volume_level_2);
        - if:
            condition:
              display.is_displaying_page: eq_control
            then:
              - lambda: |-
                  id(bass_level) = std::max(-12.0f, id(bass_level) - 1.0f);
              - homeassistant.action:
                  service: number.set_value
                  data:
                    entity_id: ${bass_entity}
                  data_template:
                    value: '{{ my_variable | float }}'
                  variables:
                    my_variable: |-
                      return id(bass_level);
        - if:
            condition:
              display.is_displaying_page: light_control
            then:
              - lambda: |-
                  id(light_brightness) = std::max(0.0f, id(light_brightness) - 0.02f);
              - homeassistant.action:
                  service: light.turn_on
                  data:
                    entity_id: ${light_entity}
                  data_template:
                    brightness_pct: '{{ my_variable | int }}'
                  variables:
                    my_variable: |-
                      return (int)(id(light_brightness) * 100);
        - lambda: |-
            id(inactivity_time) = 0;

  - platform: homeassistant
    id: media_player_volume
    entity_id: ${media_player}
    attribute: volume_level
    internal: true
    filters:
      - lambda: |-
          if (isnan(x)) { return 0; }
          else { return x; }
    on_value:
      then:
        - lambda: |-
            id(volume_level) = x;

  - platform: homeassistant
    id: media_player_volume_2
    entity_id: ${media_player_2}
    attribute: volume_level
    internal: true
    filters:
      - lambda: |-
          if (isnan(x)) { return 0; }
          else { return x; }
    on_value:
      then:
        - lambda: |-
            id(volume_level_2) = x;

  - platform: homeassistant
    id: bass_value
    entity_id: ${bass_entity}
    internal: true
    filters:
      - lambda: |-
          if (isnan(x)) { return 0; }
          else { return x; }
    on_value:
      then:
        - lambda: |-
            id(bass_level) = x;


  - platform: homeassistant
    id: light_brightness_ha
    entity_id: ${light_entity}
    attribute: brightness
    internal: true
    filters:
      - lambda: |-
          if (isnan(x)) { return 0; }
          else { return x / 255.0; }
    on_value:
      then:
        - lambda: |-
            id(light_brightness) = x;

spi:
  id: spi_bus
  mosi_pin: GPIO5
  clk_pin: GPIO6

switch:
  - platform: template
    name: "Auto Lock"
    id: auto_lock
    icon: "mdi:lock-clock"
    optimistic: true
    restore_mode: 'restore_default_off'
  - platform: template
    name: "Display"
    id: dial_display
    icon: "mdi:fit-to-screen"
    optimistic: true
    restore_mode: 'always_on'
    on_turn_on:
      - light.turn_on:
          id: backlight
          brightness: 100%
      - lambda: |-
          id(inactivity_time) = 0;
    on_turn_off:
      - light.turn_off: backlight
      - display.page.show: volume_control
  - platform: template
    name: "Screen Saver"
    id: screen_saver
    icon: "mdi:screen-rotation-lock"
    optimistic: true
    restore_mode: 'always_off'
    internal: true
    on_turn_on:
      - light.turn_on:
          id: backlight
          brightness: 50%
      - display.page.show: locked_screen
  - platform: template
    name: "Menu Sounds"
    id: menu_sounds
    icon: "mdi:playlist-music"
    optimistic: true
    restore_mode: 'restore_default_on'

  - platform: template
    name: "Flip Screen"
    id: flip_screen
    icon: "mdi:screen-rotation"
    optimistic: true
    restore_mode: 'restore_default_off'
    on_turn_on:
      - lambda: |-
          id(round_display).set_rotation(display::DISPLAY_ROTATION_180_DEGREES);
    on_turn_off:
      - lambda: |-
          id(round_display).set_rotation(display::DISPLAY_ROTATION_0_DEGREES);

text_sensor:
  - platform: homeassistant
    id: media_player_state
    entity_id: ${media_player}
    internal: true
  - platform: homeassistant
    id: media_player_muted
    entity_id: ${media_player}
    attribute: is_volume_muted
    internal: true
  - platform: homeassistant
    id: media_player_title
    entity_id: ${media_player}
    attribute: media_title
    internal: true
  - platform: homeassistant
    id: media_player_artist
    entity_id: ${media_player}
    attribute: media_artist
    internal: true
  - platform: homeassistant
    id: media_player_state_2
    entity_id: ${media_player_2}
    internal: true
  - platform: homeassistant
    id: media_player_muted_2
    entity_id: ${media_player_2}
    attribute: is_volume_muted
    internal: true
  - platform: homeassistant
    id: media_player_title_2
    entity_id: ${media_player_2}
    attribute: media_title
    internal: true
  - platform: homeassistant
    id: media_player_artist_2
    entity_id: ${media_player_2}
    attribute: media_artist
    internal: true
  - platform: homeassistant
    id: light_state
    entity_id: ${light_entity}
    internal: true

time:
  # RTC
  - platform: pcf8563
    id: rtctime
    i2c_id: internal_i2c
    address: 0x51
    update_interval: never
  - platform: homeassistant
    id: esptime
    on_time_sync:
      then:
        - pcf8563.write_time:

touchscreen:
  - platform: ft5x06
    id: touchscreen_dial
    i2c_id: internal_i2c
    address: 0x38

display:
  - platform: mipi_spi
    id: round_display
    model: GC9A01A
    cs_pin: GPIO7
    reset_pin: GPIO8
    update_interval: 1s
    data_rate: 80MHz
    dc_pin: GPIO4
    invert_colors: true
    buffer_size: 100%
    pages:
      - id: locked_screen
        lambda: |-
          it.fill(id(background_color));
          auto now = id(esptime).now();
          if (now.is_valid()) {
            it.strftime(120, 100, id(volume_font), id(color_white), TextAlign::CENTER, "%H:%M", now);
            it.strftime(120, 150, id(secondary), id(color_dim), TextAlign::CENTER, "%d/%m/%y", now);
          }

      - id: volume_control
        lambda: |-
          it.fill(id(background_color));

          int vol_pct = (int)(id(volume_level) * 100);
          bool is_muted = id(media_player_muted).has_state() &&
            (id(media_player_muted).state == "True" || id(media_player_muted).state == "true" || id(media_player_muted).state == "on");

          if (is_muted) {
            it.image(100, 55, id(mute_icon), id(color_muted));
          } else {
            it.image(100, 55, id(speaker_icon), id(color_accent));
          }

          // Page label
          it.printf(120, 40, id(small_font), id(color_dim), TextAlign::CENTER, "Living Room");

          if (is_muted) {
            it.printf(120, 125, id(volume_font), id(color_muted), TextAlign::CENTER, "MUTE");
          } else {
            it.printf(120, 125, id(volume_font), id(color_white), TextAlign::CENTER, "%d%%", vol_pct);
          }

          // Volume arc
          float angle_start = 150.0;
          float angle_range = 240.0;
          float vol_angle = angle_start + (angle_range * id(volume_level));
          for (float a = angle_start; a < angle_start + angle_range; a += 3.0) {
            float rad = a * 3.14159 / 180.0;
            float cos_a = cos(rad);
            float sin_a = sin(rad);
            auto color = (a < vol_angle && !is_muted) ? id(color_accent) : id(color_arc_bg);
            for (int r = 104; r <= 108; r++) {
              it.draw_pixel_at(120 + (int)(r * cos_a), 120 + (int)(r * sin_a), color);
            }
          }

          // Media info
          if (id(media_player_state).has_state()) {
            std::string state = id(media_player_state).state;
            if (state == "playing") {
              it.image(105, 160, id(play_icon), id(color_playing));
            } else if (state == "paused") {
              it.image(105, 160, id(pause_icon), id(color_dim));
            }
          }

          if (id(media_player_title).has_state() && id(media_player_title).state.length() > 0) {
            std::string title = id(media_player_title).state;
