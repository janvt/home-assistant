    hex: ${background_color}
  - id: color_white
    hex: 'ffffff'
  - id: color_dim
    hex: '666666'
  - id: color_accent
    hex: '4fc3f7'
  - id: color_muted
    hex: '800020'
  - id: color_playing
    hex: '69f0ae'
  - id: color_arc_bg
    hex: '333355'
  - id: color_warm
    hex: 'ffb74d'
  - id: color_eq
    hex: 'ab47bc'

font:
  - file: "gfonts://Space Grotesk"
    id: volume_font
    size: 50
    glyphs: ${allowed_characters}
  - file: "gfonts://Space Grotesk"
    id: secondary
    size: 18
    glyphs: ${allowed_characters}
  - file: "gfonts://Space Grotesk"
    id: small_font
    size: 14
    glyphs: ${allowed_characters}

globals:
  - id: inactivity_time
    type: int
    restore_value: no
    initial_value: '0'
  - id: volume_level
    type: float
    restore_value: no
    initial_value: '0.0'
  - id: volume_level_2
    type: float
    restore_value: no
    initial_value: '0.0'
  - id: bass_level
    type: float
    restore_value: no
    initial_value: '0.0'
  - id: light_brightness
    type: float
    restore_value: no
    initial_value: '0.0'
  - id: current_page
    type: int
    restore_value: no
    initial_value: '0'
  - id: actions_last_tapped
    type: int
    restore_value: no
    initial_value: '-1'

i2c:
  - id: internal_i2c
    sda: GPIO11
    scl: GPIO12
    scan: False

image:
