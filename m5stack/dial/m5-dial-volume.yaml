substitutions:

  # Device customization
  name: m5stack-dial-volume
  friendly_name: M5Stack Dial Volume
  background_color: '1a1a2e'

  # Media player entities to control
  media_player: media_player.living_room
  media_player_name: 'Living Room'
  media_player_2: media_player.unnamed_room
  media_player_2_name: 'Madagascar'

  # Bass/EQ control (number entity exposed by your media player integration)
  bass_entity: number.living_room_sub_gain

  # Light entity to control
  light_entity: light.reading_spot

  # Scene entities
  scene_vinyl: scene.vinyl
  scene_chill: scene.chill

  # HA input_select that tracks which scene is currently active.
  # See ha-scene-tracker.yaml for the helper + automation definitions.
  active_scene_helper: input_select.active_scene

  # Line In / TV source names
  # line_in_source: what HA reports in the 'source' attribute when playing from line-in
  # line_in_select: display label shown on screen
  # line_in_media_id: direct Sonos Port stream URI — find via HA Developer Tools > Template:
  #   {{ state_attr('media_player.turntable', 'uid') }}  → e.g. RINCON_000E58A1B2C301400
  line_in_source: 'Line-in'
  line_in_select: 'Turntable'
  line_in_media_id: 'x-rincon-stream:RINCON_74CA60312D6601400:0'
  tv_source: 'TV'

  # Icons
  icon_speaker: mdi:speaker
  icon_mute: mdi:volume-mute

  # Other settings
  allowed_characters: " ¿?¡!#%'()+,-./:°0123456789ABCDEFGHIJKLMNOPQRSTUVWYZabcdefghijklmnopqrstuvwxyzáéíóú"

################################################################################################################


esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  includes:
    - m5dial_helpers.h
  on_boot:
    then:
      - delay: 500ms
      - pcf8563.read_time:
      # Silence buzzer pin — keep GPIO3 low so the hardware buzzer stays quiet
      - output.turn_off: buzzer_mute
      - light.turn_on:
          id: backlight
          brightness: 100%
      - lambda: |-
          if (id(flip_screen).state) {
            id(round_display).set_rotation(display::DISPLAY_ROTATION_180_DEGREES);
          }
      - script.execute: show_current_page
  platformio_options:
    board_build.flash_mode: dio


esp32:
  board: esp32-s3-devkitc-1
  flash_size: 8MB
  framework:
    type: esp-idf


wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  manual_ip:
    static_ip: 10.69.43.33
    gateway: 10.69.43.1
    subnet: 255.255.255.0

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "M5Stack-Dial-Volume Fallback"
    password: !secret m5fallbackpassword

api:
  encryption:
    key: !secret m5dialencryption

ota:
  - platform: esphome

script:
  - id: show_current_page
    then:
      - lambda: |-
          switch(id(current_page)) {
            case 0: id(round_display).show_page(id(volume_control)); break;
            case 1: id(round_display).show_page(id(volume_control_2)); break;
            case 2: id(round_display).show_page(id(eq_control)); break;
            case 3: id(round_display).show_page(id(light_control)); break;
            case 4: id(round_display).show_page(id(actions_screen)); break;
          }

  - id: navigate
    parameters:
      delta: int
    then:
      - lambda: |-
          // Negate delta when screen is flipped (touch coords are mirrored)
          int d = id(flip_screen).state ? -delta : delta;
          // + 5 before modulo prevents negative results in C++ (-1 % 5 = -1, not 4)
          id(current_page) = (id(current_page) + d + 5) % 5;
          id(inactivity_time) = 0;
      - script.execute: show_current_page

  - id: adjust_value
    # direction: +1 (clockwise) or -1 (anticlockwise)
    parameters:
      direction: int
    then:
      - if:
          condition:
            display.is_displaying_page: locked_screen
          then:
            - switch.turn_on: dial_display
            - light.turn_on:
                id: backlight
                brightness: 100%
            - display.page.show: volume_control
      - if:
          condition:
            display.is_displaying_page: volume_control
          then:
            - lambda: |-
                id(volume_level) = std::min(1.0f, std::max(0.0f, id(volume_level) + direction * 0.02f));
            - homeassistant.action:
                service: media_player.volume_set
                data:
                  entity_id: ${media_player}
                data_template:
                  volume_level: '{{ my_variable | float }}'
                variables:
                  my_variable: |-
                    return id(volume_level);
      - if:
          condition:
            display.is_displaying_page: volume_control_2
          then:
            - lambda: |-
                id(volume_level_2) = std::min(1.0f, std::max(0.0f, id(volume_level_2) + direction * 0.02f));
            - homeassistant.action:
                service: media_player.volume_set
                data:
                  entity_id: ${media_player_2}
                data_template:
                  volume_level: '{{ my_variable | float }}'
                variables:
                  my_variable: |-
                    return id(volume_level_2);
      - if:
          condition:
            display.is_displaying_page: eq_control
          then:
            - lambda: |-
                id(bass_level) = std::min(12.0f, std::max(-12.0f, id(bass_level) + direction * 1.0f));
            - homeassistant.action:
                service: number.set_value
                data:
                  entity_id: ${bass_entity}
                data_template:
                  value: '{{ my_variable | float }}'
                variables:
                  my_variable: |-
                    return id(bass_level);
      - if:
          condition:
            display.is_displaying_page: light_control
          then:
            - lambda: |-
                id(light_brightness) = std::min(1.0f, std::max(0.0f, id(light_brightness) + direction * 0.02f));
            - homeassistant.action:
                service: light.turn_on
                data:
                  entity_id: ${light_entity}
                data_template:
                  brightness_pct: '{{ my_variable | int }}'
                variables:
                  my_variable: |-
                    return (int)(id(light_brightness) * 100);
      - lambda: |-
          id(inactivity_time) = 0;

  - id: clear_action_highlight
    then:
      - delay: 500ms
      - lambda: |-
          id(actions_last_tapped) = -1;

  - id: fire_action
    parameters:
      physical_quadrant: int
    then:
      # Compute visual quadrant: when flipped 180°, TL↔BR and TR↔BL (i.e. 3 - physical)
      - lambda: |-
          int visual = id(flip_screen).state ? (3 - physical_quadrant) : physical_quadrant;
          id(actions_last_tapped) = visual;
          ESP_LOGI("actions", "fire_action: physical=%d visual=%d flipped=%s",
            physical_quadrant, visual, id(flip_screen).state ? "yes" : "no");
      - if:
          condition:
            lambda: 'return id(actions_last_tapped) == 0;'
          then:
            # Line In / TV toggle
            - lambda: |-
                ESP_LOGI("actions", "Source toggle: current='%s' | line_in='${line_in_source}' | tv='${tv_source}' | has_state=%s",
                  id(media_player_source).has_state() ? id(media_player_source).state.c_str() : "<none>",
                  id(media_player_source).has_state() ? "yes" : "no");
            - if:
                condition:
                  lambda: 'return id(media_player_source).has_state() && id(media_player_source).state == "${line_in_source}";'
                then:
                  - lambda: |-
                      ESP_LOGI("actions", "Source toggle -> switching to TV ('${tv_source}')");
                  - homeassistant.action:
                      service: media_player.select_source
                      data:
                        entity_id: ${media_player}
                        source: ${tv_source}
                else:
                  - lambda: |-
                      ESP_LOGI("actions", "Source toggle -> switching to Line-In via URI ('${line_in_media_id}')");
                  - homeassistant.action:
                      service: media_player.play_media
                      data:
                        entity_id: ${media_player}
                        media_content_id: ${line_in_media_id}
                        media_content_type: music
      - if:
          condition:
            lambda: 'return id(actions_last_tapped) == 1;'
          then:
            # Group / Ungroup toggle
            - lambda: |-
                ESP_LOGI("actions", "Action 1: group toggle (members='%s')",
                  id(media_player_group_members).has_state() ? id(media_player_group_members).state.c_str() : "<unknown>");
            - if:
                condition:
                  lambda: 'return id(media_player_group_members).has_state() && id(media_player_group_members).state.find("${media_player_2}") != std::string::npos;'
                then:
                  - homeassistant.action:
                      service: media_player.unjoin
                      data:
                        entity_id: ${media_player_2}
                else:
                  - homeassistant.action:
                      service: media_player.join
                      data:
                        entity_id: ${media_player}
                      data_template:
                        group_members: '["${media_player_2}"]'
      - if:
          condition:
            lambda: 'return id(actions_last_tapped) == 2;'
          then:
            - lambda: |-
                ESP_LOGI("actions", "Action 2: Vinyl scene");
            - homeassistant.action:
                service: scene.turn_on
                data:
                  entity_id: ${scene_vinyl}
      - if:
          condition:
            lambda: 'return id(actions_last_tapped) == 3;'
          then:
            - lambda: |-
                ESP_LOGI("actions", "Action 3: Chill scene");
            - homeassistant.action:
                service: scene.turn_on
                data:
                  entity_id: ${scene_chill}
      - script.execute: clear_action_highlight

logger:

captive_portal:

binary_sensor:
  - platform: gpio
    name: "Front Button"
    id: front_button
    pin:
      number: GPIO42
      inverted: true
    internal: true
    on_press:
      then:
        - if:
            condition:
              light.is_on: backlight
            then:
              - if:
                  condition:
                    display.is_displaying_page: locked_screen
                  then:
                    - switch.turn_on: dial_display
                    - light.turn_on:
                        id: backlight
                        brightness: 100%
                    - script.execute: show_current_page
                  else:
                    - if:
                        condition:
                          display.is_displaying_page: volume_control
                        then:
                            - homeassistant.action:
                                service: media_player.volume_mute
                                data:
                                  entity_id: ${media_player}
                                  is_volume_muted: !lambda 'return !id(is_muted_1);'
                    - if:
                        condition:
                          display.is_displaying_page: volume_control_2
                        then:
                            - homeassistant.action:
                                service: media_player.volume_mute
                                data:
                                  entity_id: ${media_player_2}
                                  is_volume_muted: !lambda 'return !id(is_muted_2);'
                    - if:
                        condition:
                          display.is_displaying_page: light_control
                        then:
                          - homeassistant.action:
                              service: light.toggle
                              data:
                                entity_id: ${light_entity}
            else:
              - switch.turn_on: dial_display
              - light.turn_on:
                  id: backlight
                  brightness: 100%
              - script.execute: show_current_page
        - lambda: |-
            id(inactivity_time) = 0;

    on_double_click:
      then:
        # Play/Pause toggle for the active media player
        - if:
            condition:
              display.is_displaying_page: volume_control
            then:
              - homeassistant.action:
                  service: media_player.media_play_pause
                  data:
                    entity_id: ${media_player}
        - if:
            condition:
              display.is_displaying_page: volume_control_2
            then:
              - homeassistant.action:
                  service: media_player.media_play_pause
                  data:
                    entity_id: ${media_player_2}
        - lambda: |-
            id(inactivity_time) = 0;

  - platform: gpio
    name: Hold Button
    pin: GPIO46
    internal: True

  # Touch zones for page navigation (left/right edges of screen)
  - platform: touchscreen
    touchscreen_id: touchscreen_dial
    name: "Touch Wake"
    id: touch_wake
    internal: true
    x_min: 70
    x_max: 170
    y_min: 20
    y_max: 220
    on_press:
      then:
        - if:
            condition:
              or:
                - display.is_displaying_page: locked_screen
                - light.is_off: backlight
            then:
              - switch.turn_on: dial_display
              - light.turn_on:
                  id: backlight
                  brightness: 100%
              - script.execute: show_current_page
              - lambda: |-
                  id(inactivity_time) = 0;

  - platform: touchscreen
    touchscreen_id: touchscreen_dial
    name: "Nav Left"
    id: nav_left
    internal: true
    x_min: 0
    x_max: 70
    y_min: 20
    y_max: 220
    on_press:
      then:
        - script.execute:
            id: navigate
            delta: -1

  - platform: touchscreen
    touchscreen_id: touchscreen_dial
    name: "Nav Right"
    id: nav_right
    internal: true
    x_min: 170
    x_max: 240
    y_min: 20
    y_max: 220
    on_press:
      then:
        - script.execute:
            id: navigate
            delta: 1

  # Action screen quadrant touch zones
  - platform: touchscreen
    touchscreen_id: touchscreen_dial
    name: "Action TL"
    id: action_tl
    internal: true
    x_min: 70
    x_max: 120
    y_min: 0
    y_max: 120
    on_press:
      then:
        - if:
            condition:
              display.is_displaying_page: actions_screen
            then:
              - script.execute:
                  id: fire_action
                  physical_quadrant: 0
              - lambda: |-
                  id(inactivity_time) = 0;

  - platform: touchscreen
    touchscreen_id: touchscreen_dial
    name: "Action TR"
    id: action_tr
    internal: true
    x_min: 120
    x_max: 170
    y_min: 0
    y_max: 120
    on_press:
      then:
        - if:
            condition:
              display.is_displaying_page: actions_screen
            then:
              - script.execute:
                  id: fire_action
                  physical_quadrant: 1
              - lambda: |-
                  id(inactivity_time) = 0;

  - platform: touchscreen
    touchscreen_id: touchscreen_dial
    name: "Action BL"
    id: action_bl
    internal: true
    x_min: 70
    x_max: 120
    y_min: 120
    y_max: 240
    on_press:
      then:
        - if:
            condition:
              display.is_displaying_page: actions_screen
            then:
              - script.execute:
                  id: fire_action
                  physical_quadrant: 2
              - lambda: |-
                  id(inactivity_time) = 0;

  - platform: touchscreen
    touchscreen_id: touchscreen_dial
    name: "Action BR"
    id: action_br
    internal: true
    x_min: 120
    x_max: 170
    y_min: 120
    y_max: 240
    on_press:
      then:
        - if:
            condition:
              display.is_displaying_page: actions_screen
            then:
              - script.execute:
                  id: fire_action
                  physical_quadrant: 3
              - lambda: |-
                  id(inactivity_time) = 0;

color:
  - id: background_color
    hex: ${background_color}
  - id: color_white
    hex: 'ffffff'
  - id: color_dim
    hex: '666666'
  - id: color_accent
    hex: '4fc3f7'
  - id: color_muted
    hex: '800020'
  - id: color_playing
    hex: '69f0ae'
  - id: color_arc_bg
    hex: '333355'
  - id: color_warm
    hex: 'ffb74d'
  - id: color_eq
    hex: 'ab47bc'

font:
  - file: "gfonts://Space Grotesk"
    id: volume_font
    size: 50
    glyphs: ${allowed_characters}
  - file: "gfonts://Space Grotesk"
    id: secondary
    size: 18
    glyphs: ${allowed_characters}
  - file: "gfonts://Space Grotesk"
    id: small_font
    size: 14
    glyphs: ${allowed_characters}

globals:
  - id: inactivity_time
    type: int
    restore_value: no
    initial_value: '0'
  - id: volume_level
    type: float
    restore_value: no
    initial_value: '0.0'
  - id: volume_level_2
    type: float
    restore_value: no
    initial_value: '0.0'
  - id: bass_level
    type: float
    restore_value: no
    initial_value: '0.0'
  - id: light_brightness
    type: float
    restore_value: no
    initial_value: '0.0'
  - id: current_page
    type: int
    restore_value: no
    initial_value: '0'
  - id: actions_last_tapped
    type: int
    restore_value: no
    initial_value: '-1'
  - id: last_active_scene
    type: int
    restore_value: no
    initial_value: '0'
  - id: is_muted_1
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: is_muted_2
    type: bool
    restore_value: no
    initial_value: 'false'

i2c:
  - id: internal_i2c
    sda: GPIO11
    scl: GPIO12
    scan: False

image:
  - file: ${icon_speaker}
    id: speaker_icon
    resize: 40x40
    type: BINARY
    transparency: chroma_key
  - file: ${icon_mute}
    id: mute_icon
    resize: 40x40
    type: BINARY
    transparency: chroma_key
  - file: mdi:volume-plus
    id: vol_plus_icon
    resize: 30x30
    type: BINARY
    transparency: chroma_key
  - file: mdi:volume-minus
    id: vol_minus_icon
    resize: 30x30
    type: BINARY
    transparency: chroma_key
  - file: mdi:play
    id: play_icon
    resize: 30x30
    type: BINARY
    transparency: chroma_key
  - file: mdi:pause
    id: pause_icon
    resize: 30x30
    type: BINARY
    transparency: chroma_key
  - file: mdi:equalizer
    id: eq_icon
    resize: 40x40
    type: BINARY
    transparency: chroma_key
  - file: mdi:lightbulb
    id: light_icon
    resize: 40x40
    type: BINARY
    transparency: chroma_key
  - file: mdi:lightbulb-off
    id: light_off_icon
    resize: 40x40
    type: BINARY
    transparency: chroma_key
  - file: mdi:chevron-left
    id: chevron_left_icon
    resize: 24x24
    type: BINARY
    transparency: chroma_key
  - file: mdi:chevron-right
    id: chevron_right_icon
    resize: 24x24
    type: BINARY
    transparency: chroma_key
  - file: mdi:audio-input-rca
    id: line_in_icon
    resize: 44x44
    type: BINARY
    transparency: chroma_key
  - file: mdi:speaker-multiple
    id: group_icon
    resize: 44x44
    type: BINARY
    transparency: chroma_key
  - file: mdi:record
    id: vinyl_icon
    resize: 44x44
    type: BINARY
    transparency: chroma_key
  - file: mdi:candle
    id: chill_icon
    resize: 44x44
    type: BINARY
    transparency: chroma_key

interval:
  - interval: 1s
    then:
      - lambda: |-
          id(inactivity_time) += 1;
          if (id(inactivity_time) > id(screen_saver_time).state) {
            id(screen_saver).turn_on();
          }

light:
  - platform: monochromatic
    name: "Backlight"
    output: backlight_pwm
    id: backlight
    default_transition_length: 0s
    restore_mode: ALWAYS_ON
    internal: True

number:
  - platform: template
    name: "Screen Saver"
    id: screen_saver_time
    icon: "mdi:screen-rotation-lock"
    optimistic: true
    min_value: 10
    max_value: 300
    step: 10
    unit_of_measurement: "s"
    restore_value: true

output:
  # GPIO3 is the hardware buzzer pin — defined here only to drive it low and keep it silent
  - platform: gpio
    pin: GPIO3
    id: buzzer_mute
  - platform: ledc
    pin: GPIO9
    id: backlight_pwm

sensor:
  - platform: rotary_encoder
    id: encoder
    pin_a: GPIO40
    pin_b: GPIO41
    on_clockwise:
      then:
        - script.execute:
            id: adjust_value
            direction: 1
    on_anticlockwise:
      then:
        - script.execute:
            id: adjust_value
            direction: -1

  - platform: homeassistant
    id: media_player_volume
    entity_id: ${media_player}
    attribute: volume_level
    internal: true
    filters:
      - lambda: |-
          if (isnan(x)) { return 0; }
          else { return x; }
    on_value:
      then:
        - lambda: |-
            id(volume_level) = x;

  - platform: homeassistant
    id: media_player_volume_2
    entity_id: ${media_player_2}
    attribute: volume_level
    internal: true
    filters:
      - lambda: |-
          if (isnan(x)) { return 0; }
          else { return x; }
    on_value:
      then:
        - lambda: |-
            id(volume_level_2) = x;

  - platform: homeassistant
    id: bass_value
    entity_id: ${bass_entity}
    internal: true
    filters:
      - lambda: |-
          if (isnan(x)) { return 0; }
          else { return x; }
    on_value:
      then:
        - lambda: |-
            id(bass_level) = x;


  - platform: homeassistant
    id: light_brightness_ha
    entity_id: ${light_entity}
    attribute: brightness
    internal: true
    filters:
      - lambda: |-
          if (isnan(x)) { return 0; }
          else { return x / 255.0; }
    on_value:
      then:
        - lambda: |-
            id(light_brightness) = x;

spi:
  id: spi_bus
  mosi_pin: GPIO5
  clk_pin: GPIO6

switch:
  - platform: template
    name: "Display"
    id: dial_display
    icon: "mdi:fit-to-screen"
    optimistic: true
    restore_mode: 'always_on'
    on_turn_on:
      - light.turn_on:
          id: backlight
          brightness: 100%
      - lambda: |-
          id(inactivity_time) = 0;
    on_turn_off:
      - light.turn_off: backlight
      - display.page.show: volume_control
  - platform: template
    name: "Screen Saver"
    id: screen_saver
    icon: "mdi:screen-rotation-lock"
    optimistic: true
    restore_mode: 'always_off'
    internal: true
    on_turn_on:
      - light.turn_on:
          id: backlight
          brightness: 50%
      - display.page.show: locked_screen

  - platform: template
    name: "Flip Screen"
    id: flip_screen
    icon: "mdi:screen-rotation"
    optimistic: true
    restore_mode: 'restore_default_off'
    on_turn_on:
      - lambda: |-
          id(round_display).set_rotation(display::DISPLAY_ROTATION_180_DEGREES);
    on_turn_off:
      - lambda: |-
          id(round_display).set_rotation(display::DISPLAY_ROTATION_0_DEGREES);

text_sensor:
  - platform: homeassistant
    id: media_player_state
    entity_id: ${media_player}
    internal: true
  - platform: homeassistant
    id: media_player_muted
    entity_id: ${media_player}
    attribute: is_volume_muted
    internal: true
    on_value:
      then:
        - lambda: |-
            id(is_muted_1) = (x == "True" || x == "true" || x == "on");
  - platform: homeassistant
    id: media_player_title
    entity_id: ${media_player}
    attribute: media_title
    internal: true
  - platform: homeassistant
    id: media_player_artist
    entity_id: ${media_player}
    attribute: media_artist
    internal: true
  - platform: homeassistant
    id: media_player_state_2
    entity_id: ${media_player_2}
    internal: true
  - platform: homeassistant
    id: media_player_muted_2
    entity_id: ${media_player_2}
    attribute: is_volume_muted
    internal: true
    on_value:
      then:
        - lambda: |-
            id(is_muted_2) = (x == "True" || x == "true" || x == "on");
  - platform: homeassistant
    id: media_player_title_2
    entity_id: ${media_player_2}
    attribute: media_title
    internal: true
  - platform: homeassistant
    id: media_player_artist_2
    entity_id: ${media_player_2}
    attribute: media_artist
    internal: true
  - platform: homeassistant
    id: light_state
    entity_id: ${light_entity}
    internal: true
  - platform: homeassistant
    id: media_player_source
    entity_id: ${media_player}
    attribute: source
    internal: true
  - platform: homeassistant
    id: media_player_group_members
    entity_id: ${media_player}
    attribute: group_members
    internal: true
  - platform: homeassistant
    id: active_scene_state
    entity_id: ${active_scene_helper}
    internal: true
    on_value:
      then:
        - lambda: |-
            ESP_LOGI("scene", "Active scene changed: '%s'", x.c_str());
            if (x == "vinyl")      id(last_active_scene) = 2;
            else if (x == "chill") id(last_active_scene) = 3;
            else                   id(last_active_scene) = 0;

time:
  # RTC
  - platform: pcf8563
    id: rtctime
    i2c_id: internal_i2c
    address: 0x51
    update_interval: never
  - platform: homeassistant
    id: esptime
    on_time_sync:
      then:
        - pcf8563.write_time:

touchscreen:
  - platform: ft5x06
    id: touchscreen_dial
    i2c_id: internal_i2c
    address: 0x38

display:
  - platform: mipi_spi
    id: round_display
    model: GC9A01A
    cs_pin: GPIO7
    reset_pin: GPIO8
    update_interval: 1s
    data_rate: 80MHz
    dc_pin: GPIO4
    invert_colors: true
    buffer_size: 100%
    pages:
      - id: locked_screen
        lambda: |-
          it.fill(id(background_color));

          // Time (top, large)
          auto now = id(esptime).now();
          if (now.is_valid()) {
            it.strftime(120, 68, id(volume_font), id(color_white), TextAlign::CENTER, "%H:%M", now);
          }

          // Living Room (left column, centre x=72)
          bool muted_lr = id(is_muted_1);
          int vol_lr = (int)(id(volume_level) * 100);
          auto lr_color = muted_lr ? id(color_muted) : id(color_accent);
          it.image(52, 105, muted_lr ? id(mute_icon) : id(speaker_icon), lr_color);
          if (muted_lr) {
            it.printf(72, 153, id(small_font), lr_color, TextAlign::CENTER, "MUTE");
          } else {
            it.printf(72, 153, id(secondary), lr_color, TextAlign::CENTER, "%d%%", vol_lr);
          }
          it.printf(72, 171, id(small_font), id(color_dim), TextAlign::CENTER, "${media_player_name}");

          // Madagascar (right column, centre x=168)
          bool muted_mdg = id(is_muted_2);
          int vol_mdg = (int)(id(volume_level_2) * 100);
          auto mdg_color = muted_mdg ? id(color_muted) : id(color_accent);
          it.image(148, 105, muted_mdg ? id(mute_icon) : id(speaker_icon), mdg_color);
          if (muted_mdg) {
            it.printf(168, 153, id(small_font), mdg_color, TextAlign::CENTER, "MUTE");
          } else {
            it.printf(168, 153, id(secondary), mdg_color, TextAlign::CENTER, "%d%%", vol_mdg);
          }
          it.printf(168, 171, id(small_font), id(color_dim), TextAlign::CENTER, "${media_player_2_name}");

          // Source (bottom-left) and group status (bottom-right)
          {
            std::string src = id(media_player_source).has_state() ? id(media_player_source).state : "";
            const char* src_label = (src == "${tv_source}") ? "TV" :
                                    (src == "${line_in_source}") ? "${line_in_select}" : src.c_str();
            auto src_color = (src == "${line_in_source}") ? id(color_warm) :
                             (src == "${tv_source}") ? id(color_accent) : id(color_dim);
            it.printf(72, 197, id(small_font), src_color, TextAlign::CENTER, "%s", src_label);

            bool is_grouped = id(media_player_group_members).has_state() &&
              id(media_player_group_members).state.find("${media_player_2}") != std::string::npos;
            it.printf(168, 197, id(small_font),
              is_grouped ? id(color_playing) : id(color_dim),
              TextAlign::CENTER, is_grouped ? "Grouped" : "Solo");
          }

      - id: volume_control
        lambda: |-
          it.fill(id(background_color));

          int vol_pct = (int)(id(volume_level) * 100);
          bool is_muted = id(is_muted_1);

          if (is_muted) {
            it.image(100, 55, id(mute_icon), id(color_muted));
          } else {
            it.image(100, 55, id(speaker_icon), id(color_accent));
          }

          // Page label
          it.printf(120, 40, id(small_font), id(color_dim), TextAlign::CENTER, "${media_player_name}");

          if (is_muted) {
            it.printf(120, 125, id(volume_font), id(color_muted), TextAlign::CENTER, "MUTE");
          } else {
            it.printf(120, 125, id(volume_font), id(color_white), TextAlign::CENTER, "%d%%", vol_pct);
          }

          // Volume arc
          draw_arc(it, is_muted ? 0.0f : id(volume_level), id(color_accent), id(color_arc_bg));

          // Media info
          if (id(media_player_state).has_state()) {
            std::string state = id(media_player_state).state;
            if (state == "playing") {
              it.image(105, 160, id(play_icon), id(color_playing));
            } else if (state == "paused") {
              it.image(105, 160, id(pause_icon), id(color_dim));
            }
          }

          if (id(media_player_title).has_state() && id(media_player_title).state.length() > 0) {
            std::string title = id(media_player_title).state;
            if (title.length() > 20) title = title.substr(0, 18) + "..";
            it.printf(120, 200, id(small_font), id(color_white), TextAlign::CENTER, "%s", title.c_str());
          }
          if (id(media_player_artist).has_state() && id(media_player_artist).state.length() > 0) {
            std::string artist = id(media_player_artist).state;
            if (artist.length() > 22) artist = artist.substr(0, 20) + "..";
            it.printf(120, 215, id(small_font), id(color_dim), TextAlign::CENTER, "%s", artist.c_str());
          }

          draw_chrome(it, id(current_page), 5, id(color_accent), id(color_dim), id(chevron_left_icon), id(chevron_right_icon));

      - id: volume_control_2
        lambda: |-
          it.fill(id(background_color));

          int vol_pct = (int)(id(volume_level_2) * 100);
          bool is_muted = id(is_muted_2);

          if (is_muted) {
            it.image(100, 55, id(mute_icon), id(color_muted));
          } else {
            it.image(100, 55, id(speaker_icon), id(color_accent));
          }

          it.printf(120, 40, id(small_font), id(color_dim), TextAlign::CENTER, "${media_player_2_name}");

          if (is_muted) {
            it.printf(120, 125, id(volume_font), id(color_muted), TextAlign::CENTER, "MUTE");
          } else {
            it.printf(120, 125, id(volume_font), id(color_white), TextAlign::CENTER, "%d%%", vol_pct);
          }

          // Volume arc
          draw_arc(it, is_muted ? 0.0f : id(volume_level_2), id(color_accent), id(color_arc_bg));

          // Media info
          if (id(media_player_state_2).has_state()) {
            std::string state = id(media_player_state_2).state;
            if (state == "playing") {
              it.image(105, 160, id(play_icon), id(color_playing));
            } else if (state == "paused") {
              it.image(105, 160, id(pause_icon), id(color_dim));
            }
          }

          if (id(media_player_title_2).has_state() && id(media_player_title_2).state.length() > 0) {
            std::string title = id(media_player_title_2).state;
            if (title.length() > 20) title = title.substr(0, 18) + "..";
            it.printf(120, 200, id(small_font), id(color_white), TextAlign::CENTER, "%s", title.c_str());
          }
          if (id(media_player_artist_2).has_state() && id(media_player_artist_2).state.length() > 0) {
            std::string artist = id(media_player_artist_2).state;
            if (artist.length() > 22) artist = artist.substr(0, 20) + "..";
            it.printf(120, 215, id(small_font), id(color_dim), TextAlign::CENTER, "%s", artist.c_str());
          }

          draw_chrome(it, id(current_page), 5, id(color_accent), id(color_dim), id(chevron_left_icon), id(chevron_right_icon));

      - id: eq_control
        lambda: |-
          it.fill(id(background_color));

          it.image(100, 55, id(eq_icon), id(color_eq));

          it.printf(120, 40, id(small_font), id(color_dim), TextAlign::CENTER, "Bass");
          it.printf(120, 125, id(volume_font), id(color_white), TextAlign::CENTER, "%.0f", id(bass_level));
          it.printf(120, 170, id(small_font), id(color_eq), TextAlign::CENTER, "dB");

          // Bass arc (-12 to +12 range)
          draw_arc(it, (id(bass_level) + 12.0f) / 24.0f, id(color_eq), id(color_arc_bg));


          draw_chrome(it, id(current_page), 5, id(color_eq), id(color_dim), id(chevron_left_icon), id(chevron_right_icon));

      - id: light_control
        lambda: |-
          it.fill(id(background_color));

          bool is_on = id(light_state).has_state() && id(light_state).state == "on";
          int bright_pct = (int)(id(light_brightness) * 100);

          if (is_on) {
            it.image(100, 55, id(light_icon), id(color_warm));
          } else {
            it.image(100, 55, id(light_off_icon), id(color_dim));
          }

          it.printf(120, 40, id(small_font), id(color_dim), TextAlign::CENTER, "Light");

          if (is_on) {
            it.printf(120, 125, id(volume_font), id(color_white), TextAlign::CENTER, "%d%%", bright_pct);
          } else {
            it.printf(120, 125, id(volume_font), id(color_dim), TextAlign::CENTER, "OFF");
          }

          // Brightness arc
          draw_arc(it, is_on ? id(light_brightness) : 0.0f, id(color_warm), id(color_arc_bg));

          it.printf(120, 200, id(small_font), id(color_dim), TextAlign::CENTER, "Press to toggle");

          draw_chrome(it, id(current_page), 5, id(color_warm), id(color_dim), id(chevron_left_icon), id(chevron_right_icon));

      - id: actions_screen
        lambda: |-
          it.fill(id(background_color));

          // Page title
          it.printf(120, 25, id(small_font), id(color_dim), TextAlign::CENTER, "Actions");

          // Subtle cross divider
          it.line(60, 120, 180, 120, id(color_dim));
          it.line(120, 60, 120, 180, id(color_dim));

          // Top-left: Line In / TV toggle  (center of left column: x=95)
          {
            bool on_line_in = id(media_player_source).has_state() && id(media_player_source).state == "${line_in_source}";
            bool on_tv = id(media_player_source).has_state() && id(media_player_source).state == "${tv_source}";
            auto tl_color = (id(actions_last_tapped) == 0) ? id(color_warm) :
                            (on_line_in ? id(color_warm) : (on_tv ? id(color_accent) : id(color_dim)));
            it.image(63, 64, id(line_in_icon), tl_color);
          }

          // Top-right: Group toggle
          {
            bool is_grouped = id(media_player_group_members).has_state() &&
                id(media_player_group_members).state.find("${media_player_2}") != std::string::npos;
            auto tr_color = (id(actions_last_tapped) == 1) ? id(color_playing) :
                            (is_grouped ? id(color_playing) : id(color_dim));
            it.image(133, 64, id(group_icon), tr_color);
          }

          // Bottom-left: Vinyl
          {
            bool vinyl_active = (id(last_active_scene) == 2);
            auto bl_color = (id(actions_last_tapped) == 2) ? id(color_eq) :
                            (vinyl_active ? id(color_eq) : id(color_dim));
            it.image(63, 136, id(vinyl_icon), bl_color);
          }

          // Bottom-right: Chill
          {
            bool chill_active = (id(last_active_scene) == 3);
            auto br_color = (id(actions_last_tapped) == 3) ? id(color_accent) :
                            (chill_active ? id(color_accent) : id(color_dim));
            it.image(133, 136, id(chill_icon), br_color);
          }

          draw_chrome(it, id(current_page), 5, id(color_white), id(color_dim), id(chevron_left_icon), id(chevron_right_icon));
