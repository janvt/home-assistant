substitutions:
  # Device customization
  name: m5stack-cores3
  friendly_name: M5Stack CoreS3
  background_color: '1a1a2e'

  # Media player entities to control
  media_player: media_player.living_room
  media_player_name: 'Living Room'
  media_player_2: media_player.unnamed_room
  media_player_2_name: 'Madagascar'

  # Bass/EQ control (number entity exposed by your media player integration)
  bass_entity: number.living_room_sub_gain

  # Light entity to control
  light_entity: light.reading_spot

  # Scene entities
  scene_vinyl: scene.vinyl
  scene_chill: scene.chill

  # HA input_select that tracks which scene is currently active.
  # See ha-scene-tracker.yaml for the helper + automation definitions.
  active_scene_helper: input_select.active_scene

  # Line In / TV source names
  # line_in_source: what HA reports in the 'source' attribute when playing from line-in
  # line_in_select: display label shown on screen
  # line_in_media_id: direct Sonos Port stream URI — find via HA Developer Tools > Template:
  #   {{ state_attr('media_player.turntable', 'uid') }}  e.g. RINCON_000E58A1B2C301400
  line_in_source: 'Line-in'
  line_in_select: 'Turntable'
  line_in_media_id: 'x-rincon-stream:RINCON_74CA60312D6601400:0'
  tv_source: 'TV'

  # Icons
  icon_speaker: mdi:speaker
  icon_mute: mdi:volume-mute

  # Other settings
  allowed_characters: " ?!#%'()+,-./:0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz"

################################################################################################################
esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  includes:
    - m5cores3_helpers.h
  on_boot:
    # Priority 250: runs after all component setup.
    # AW9523 outputs default to LOW, holding both LCD_RST and touch RST active.
    # Release both here, wait for POR, then re-run the display init sequence.
    - priority: 250
      then:
        - output.turn_on: lcd_reset      # AW9523 P1.1 HIGH → release LCD from reset
        - output.turn_on: touch_reset    # AW9523 P0.5 HIGH → release FT6336U from reset
        - delay: 120ms                   # ILI9342C + FT6336U POR both need ≥ 120 ms
        - lambda: |-
            id(main_display).setup();  // Re-send display init sequence to now-awake panel
            id(main_touch).setup();    // Re-initialise touch IC now that reset is released

    # Priority -100: all components running — apply user preferences.
    - priority: -100
      then:
        - delay: 200ms
        - light.turn_on:
            id: backlight
            brightness: !lambda 'return id(screen_brightness).state / 100.0f;'
        - lambda: |-
            if (id(flip_screen).state) {
              id(main_display).set_rotation(display::DISPLAY_ROTATION_180_DEGREES);
            }
        - script.execute: show_current_page

# M5Stack CoreS3: ESP32-S3
esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: arduino

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  manual_ip:
    static_ip: 10.69.43.35
    gateway: 10.69.43.1
    subnet: 255.255.255.0
  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "M5Stack-CoreS3-Volume Fallback"
    password: !secret m5fallbackpassword

api:
  encryption:
    key: !secret m5cores3encryption

external_components:
  - source: github://RAR/esphome-axp2101
    components: [axp2101, aw9523]

ota:
  - platform: esphome

script:
  - id: show_current_page
    then:
      - lambda: |-
          switch(id(current_page)) {
            case 0: id(main_display).show_page(id(volume_control)); break;
            case 1: id(main_display).show_page(id(volume_control_2)); break;
            case 2: id(main_display).show_page(id(eq_control)); break;
            case 3: id(main_display).show_page(id(light_control)); break;
            case 4: id(main_display).show_page(id(actions_screen)); break;
          }
      - component.update: main_display
  - id: navigate
    parameters:
      delta: int
    then:
      - if:
          condition:
            display.is_displaying_page: locked_screen
          then:
            - switch.turn_on: dial_display
            - light.turn_on:
                id: backlight
                brightness: !lambda 'return id(screen_brightness).state / 100.0f;'
            - script.execute: show_current_page
            - lambda: id(inactivity_time) = 0;
          else:
            - lambda: |-
                // Negate delta when screen is flipped (touch coords are mirrored)
                int d = id(flip_screen).state ? -delta : delta;
                // + 5 before modulo prevents negative results in C++ (-1 % 5 = -1, not 4)
                id(current_page) = (id(current_page) + d + 5) % 5;
                id(inactivity_time) = 0;
            - script.execute: show_current_page
  - id: send_value_to_ha
    # Debounced: restarts on every touch, fires after the last one.
    # Keeps HA API calls low when tapping rapidly.
    mode: restart
    then:
      - delay: !lambda 'return (uint32_t)id(debounce_delay).state;'
      - if:
          condition:
            display.is_displaying_page: volume_control
          then:
            - homeassistant.action:
                service: media_player.volume_set
                data:
                  entity_id: ${media_player}
                data_template:
                  volume_level: '{{ my_variable | float }}'
                variables:
                  my_variable: |-
                    return id(volume_level);
      - if:
          condition:
            display.is_displaying_page: volume_control_2
          then:
            - homeassistant.action:
                service: media_player.volume_set
                data:
                  entity_id: ${media_player_2}
                data_template:
                  volume_level: '{{ my_variable | float }}'
                variables:
                  my_variable: |-
                    return id(volume_level_2);
      - if:
          condition:
            display.is_displaying_page: eq_control
          then:
            - homeassistant.action:
                service: number.set_value
                data:
                  entity_id: ${bass_entity}
                data_template:
                  value: '{{ my_variable | float }}'
                variables:
                  my_variable: |-
                    return id(bass_level);
      - if:
          condition:
            display.is_displaying_page: light_control
          then:
            - homeassistant.action:
                service: light.turn_on
                data:
                  entity_id: ${light_entity}
                data_template:
                  brightness_pct: '{{ my_variable | int }}'
                variables:
                  my_variable: |-
                    return (int)(id(light_brightness) * 100);
  - id: adjust_value
    # direction: +1 (right-side tap) or -1 (left-side tap)
    parameters:
      direction: int
    then:
      - if:
          condition:
            display.is_displaying_page: locked_screen
          then:
            - switch.turn_on: dial_display
            - light.turn_on:
                id: backlight
                brightness: !lambda 'return id(screen_brightness).state / 100.0f;'
            - display.page.show: volume_control
      - if:
          condition:
            display.is_displaying_page: volume_control
          then:
            - lambda: |-
                id(volume_level) = std::min(1.0f, std::max(0.0f, id(volume_level) + direction * (id(volume_step).state / 100.0f)));
      - if:
          condition:
            display.is_displaying_page: volume_control_2
          then:
            - lambda: |-
                id(volume_level_2) = std::min(1.0f, std::max(0.0f, id(volume_level_2) + direction * (id(volume_step).state / 100.0f)));
      - if:
          condition:
            display.is_displaying_page: eq_control
          then:
            - lambda: |-
                id(bass_level) = std::min(12.0f, std::max(-12.0f, id(bass_level) + direction * id(bass_step).state));
      - if:
          condition:
            display.is_displaying_page: light_control
          then:
            - lambda: |-
                id(light_brightness) = std::min(1.0f, std::max(0.0f, id(light_brightness) + direction * (id(light_step).state / 100.0f)));
      - script.execute: send_value_to_ha
      - lambda: |-
          id(inactivity_time) = 0;
      - component.update: main_display
  - id: clear_action_highlight
    then:
      - delay: 500ms
      - lambda: |-
          id(actions_last_tapped) = -1;
      - component.update: main_display
  - id: fire_action
    parameters:
      physical_quadrant: int
    then:
      # Compute visual quadrant: when flipped 180 deg, TL<->BR and TR<->BL (i.e. 3 - physical)
      - lambda: |-
          int visual = id(flip_screen).state ? (3 - physical_quadrant) : physical_quadrant;
          id(actions_last_tapped) = visual;
          ESP_LOGI("actions", "fire_action: physical=%d visual=%d flipped=%s",
            physical_quadrant, visual, id(flip_screen).state ? "yes" : "no");
      - if:
          condition:
            lambda: 'return id(actions_last_tapped) == 0;'
          then:
            # Line In / TV toggle
            - lambda: |-
                ESP_LOGI("actions", "Source toggle: current='%s' | line_in='${line_in_source}' | tv='${tv_source}' | has_state=%s",
                  id(media_player_source).has_state() ? id(media_player_source).state.c_str() : "<none>",
                  id(media_player_source).has_state() ? "yes" : "no");
            - if:
                condition:
                  lambda: 'return id(media_player_source).has_state() && id(media_player_source).state == "${line_in_source}";'
                then:
                  - lambda: |-
                      ESP_LOGI("actions", "Source toggle -> switching to TV ('${tv_source}')");
                  - homeassistant.action:
                      service: media_player.select_source
                      data:
                        entity_id: ${media_player}
                        source: ${tv_source}
                else:
                  - lambda: |-
                      ESP_LOGI("actions", "Source toggle -> switching to Line-In via URI ('${line_in_media_id}')");
                  - homeassistant.action:
                      service: media_player.play_media
                      data:
                        entity_id: ${media_player}
                        media_content_id: ${line_in_media_id}
                        media_content_type: music
      - if:
          condition:
            lambda: 'return id(actions_last_tapped) == 1;'
          then:
            # Group / Ungroup toggle
            - lambda: |-
                ESP_LOGI("actions", "Action 1: group toggle (members='%s')",
                  id(media_player_group_members).has_state() ? id(media_player_group_members).state.c_str() : "<unknown>");
            - if:
                condition:
                  lambda: 'return id(media_player_group_members).has_state() && id(media_player_group_members).state.find("${media_player_2}") != std::string::npos;'
                then:
                  - homeassistant.action:
                      service: media_player.unjoin
                      data:
                        entity_id: ${media_player_2}
                else:
                  - homeassistant.action:
                      service: media_player.join
                      data:
                        entity_id: ${media_player}
                      data_template:
                        group_members: '["${media_player_2}"]'
      - if:
          condition:
            lambda: 'return id(actions_last_tapped) == 2;'
          then:
            - lambda: |-
                ESP_LOGI("actions", "Action 2: Vinyl scene");
            - homeassistant.action:
                service: scene.turn_on
                data:
                  entity_id: ${scene_vinyl}
      - if:
          condition:
            lambda: 'return id(actions_last_tapped) == 3;'
          then:
            - lambda: |-
                ESP_LOGI("actions", "Action 3: Chill scene");
            - homeassistant.action:
                service: scene.turn_on
                data:
                  entity_id: ${scene_chill}
      - script.execute: clear_action_highlight
  # Double-press detection for Btn B.
  # Waits 350 ms after the last press; >=2 presses -> play/pause, else -> context action.
  - id: btn_b_timer
    mode: restart
    then:
      - delay: 350ms
      - lambda: |-
          id(btn_b_double) = (id(btn_b_press_count) >= 2);
          id(btn_b_press_count) = 0;
      - if:
          condition:
            lambda: 'return id(btn_b_double);'
          then:
            # Double-press: play/pause for the active media player
            - if:
                condition:
                  display.is_displaying_page: volume_control
                then:
                  - homeassistant.action:
                      service: media_player.media_play_pause
                      data:
                        entity_id: ${media_player}
            - if:
                condition:
                  display.is_displaying_page: volume_control_2
                then:
                  - homeassistant.action:
                      service: media_player.media_play_pause
                      data:
                        entity_id: ${media_player_2}
          else:
            # Single press: wake screensaver or context action
            - if:
                condition:
                  or:
                    - display.is_displaying_page: locked_screen
                    - light.is_off: backlight
                then:
                  - switch.turn_on: dial_display
                  - light.turn_on:
                      id: backlight
                      brightness: !lambda 'return id(screen_brightness).state / 100.0f;'
                  - script.execute: show_current_page
                else:
                  - if:
                      condition:
                        display.is_displaying_page: volume_control
                      then:
                        - homeassistant.action:
                            service: media_player.volume_mute
                            data:
                              entity_id: ${media_player}
                              is_volume_muted: !lambda 'return !id(is_muted_1);'
                  - if:
                      condition:
                        display.is_displaying_page: volume_control_2
                      then:
                        - homeassistant.action:
                            service: media_player.volume_mute
                            data:
                              entity_id: ${media_player_2}
                              is_volume_muted: !lambda 'return !id(is_muted_2);'
                  - if:
                      condition:
                        display.is_displaying_page: light_control
                      then:
                        - homeassistant.action:
                            service: light.toggle
                            data:
                              entity_id: ${light_entity}
      - lambda: |-
          id(inactivity_time) = 0;
logger:
captive_portal:
binary_sensor:
  # ── Five non-overlapping touch zones ─────────────────────────────────────
  #
  #   ┌──────────────────┬──────────────────┐  y = 0
  #   │   TL  (0)        │   TR  (1)        │
  #   │   Adjust –       │   Adjust +       │
  #   │   x 0-160        │   x 160-320      │
  #   ├────────┬─────────┴──────────┬───────┤  y = 120
  #   │  BL(2) │      BC (Btn B)    │ BR(3) │
  #   │ Nav ◄  │  Toggle / Mute     │ Nav ► │
  #   │ x 0-96 │  x 96-224          │x224-320
  #   └────────┴────────────────────┴───────┘  y = 240
  #
  # Actions-screen mapping: TL=0, TR=1, BL=2, BR=3 (BC unused)
  # ─────────────────────────────────────────────────────────────────────────

  # TL — Adjust minus  /  Actions quadrant 0 (top-left)
  - platform: touchscreen
    name: "Adjust Minus"
    id: adjust_minus
    touchscreen_id: main_touch
    internal: true
    x_min: 0
    x_max: 160
    y_min: 0
    y_max: 120
    on_press:
      then:
        - if:
            condition:
              display.is_displaying_page: actions_screen
            then:
              - script.execute:
                  id: fire_action
                  physical_quadrant: 0  # Top-left
            else:
              - script.execute:
                  id: adjust_value
                  direction: -1

  # TR — Adjust plus  /  Actions quadrant 1 (top-right)
  - platform: touchscreen
    name: "Adjust Plus"
    id: adjust_plus
    touchscreen_id: main_touch
    internal: true
    x_min: 160
    x_max: 320
    y_min: 0
    y_max: 120
    on_press:
      then:
        - if:
            condition:
              display.is_displaying_page: actions_screen
            then:
              - script.execute:
                  id: fire_action
                  physical_quadrant: 1  # Top-right
            else:
              - script.execute:
                  id: adjust_value
                  direction: 1

  # BL — Navigate prev  /  Actions quadrant 2 (bottom-left)
  - platform: touchscreen
    name: "Soft Btn A"
    id: btn_a
    touchscreen_id: main_touch
    internal: true
    x_min: 0
    x_max: 96
    y_min: 120
    y_max: 240
    on_press:
      then:
        - if:
            condition:
              display.is_displaying_page: actions_screen
            then:
              - script.execute:
                  id: fire_action
                  physical_quadrant: 2  # Bottom-left
            else:
              - script.execute:
                  id: navigate
                  delta: -1
              - lambda: id(inactivity_time) = 0;

  # BC — Btn B center: toggle / mute / play-pause
  - platform: touchscreen
    name: "Soft Btn B Center"
    id: btn_b
    touchscreen_id: main_touch
    internal: true
    x_min: 96
    x_max: 224
    y_min: 120
    y_max: 240
    on_press:
      then:
        - lambda: id(btn_b_press_count)++;
        - script.execute: btn_b_timer

  # BR — Navigate next  /  Actions quadrant 3 (bottom-right)
  - platform: touchscreen
    name: "Soft Btn C"
    id: btn_c
    touchscreen_id: main_touch
    internal: true
    x_min: 224
    x_max: 320
    y_min: 120
    y_max: 240
    on_press:
      then:
        - if:
            condition:
              display.is_displaying_page: actions_screen
            then:
              - script.execute:
                  id: fire_action
                  physical_quadrant: 3  # Bottom-right
            else:
              - script.execute:
                  id: navigate
                  delta: 1
              - lambda: id(inactivity_time) = 0;

color:
  - id: background_color
    hex: ${background_color}
  - id: color_white
    hex: 'ffffff'
  - id: color_dim
    hex: '666666'
  - id: color_accent
    hex: '4fc3f7'
  - id: color_muted
    hex: '800020'
  - id: color_playing
    hex: '69f0ae'
  - id: color_arc_bg
    hex: '333355'
  - id: color_warm
    hex: 'ffb74d'
  - id: color_eq
    hex: 'ab47bc'
font:
  - file: "gfonts://Space Grotesk"
    id: volume_font
    size: 50
    glyphs: ${allowed_characters}
  - file: "gfonts://Space Grotesk"
    id: secondary
    size: 18
    glyphs: ${allowed_characters}
  - file: "gfonts://Space Grotesk"
    id: small_font
    size: 14
    glyphs: ${allowed_characters}
globals:
  - id: inactivity_time
    type: int
    restore_value: no
    initial_value: '0'
  - id: volume_level
    type: float
    restore_value: no
    initial_value: '0.0'
  - id: volume_level_2
    type: float
    restore_value: no
    initial_value: '0.0'
  - id: bass_level
    type: float
    restore_value: no
    initial_value: '0.0'
  - id: light_brightness
    type: float
    restore_value: no
    initial_value: '0.0'
  - id: current_page
    type: int
    restore_value: no
    initial_value: '0'
  - id: actions_last_tapped
    type: int
    restore_value: no
    initial_value: '-1'
  - id: last_active_scene
    type: int
    restore_value: no
    initial_value: '0'
  - id: is_muted_1
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: is_muted_2
    type: bool
    restore_value: no
    initial_value: 'false'
  # Btn B double-press detection
  - id: btn_b_press_count
    type: int
    restore_value: no
    initial_value: '0'
  - id: btn_b_double
    type: bool
    restore_value: no
    initial_value: 'false'

# I2C: SDA=GPIO12, SCL=GPIO11  (CoreS3 internal bus)
i2c:
  - id: internal_i2c
    sda: GPIO12
    scl: GPIO11
    scan: true  # Necessary to find the AW9523 and AXP2101

touchscreen:
  - platform: ft63x6
    id: main_touch
    i2c_id: internal_i2c
    interrupt_pin: GPIO21   # FT6336U INT pin on CoreS3
    # Provide simple touch coordinate dumping for debugging
    on_touch:
      - logger.log:
          format: "Touch at (%d, %d)"
          args: [touch.x, touch.y]

axp2101:
  id: axp2101_component
  model: M5CORES3
  address: 0x34
  i2c_id: internal_i2c
  update_interval: 30s

aw9523:
  id: aw9523_component
  address: 0x58
  i2c_id: internal_i2c

image:
  - file: ${icon_speaker}
    id: speaker_icon
    resize: 40x40
    type: BINARY
    transparency: chroma_key
  - file: ${icon_mute}
    id: mute_icon
    resize: 40x40
    type: BINARY
    transparency: chroma_key
  - file: mdi:play
    id: play_icon
    resize: 30x30
    type: BINARY
    transparency: chroma_key
  - file: mdi:pause
    id: pause_icon
    resize: 30x30
    type: BINARY
    transparency: chroma_key
  - file: mdi:equalizer
    id: eq_icon
    resize: 40x40
    type: BINARY
    transparency: chroma_key
  - file: mdi:lightbulb
    id: light_icon
    resize: 40x40
    type: BINARY
    transparency: chroma_key
  - file: mdi:lightbulb-off
    id: light_off_icon
    resize: 40x40
    type: BINARY
