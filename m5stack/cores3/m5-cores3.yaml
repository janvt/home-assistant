  - file: mdi:audio-input-rca
    id: line_in_icon
    resize: 44x44
    type: BINARY
    transparency: chroma_key
  - file: mdi:speaker-multiple
    id: group_icon
    resize: 44x44
    type: BINARY
    transparency: chroma_key
  - file: mdi:record
    id: vinyl_icon
    resize: 44x44
    type: BINARY
    transparency: chroma_key
  - file: mdi:candle
    id: chill_icon
    resize: 44x44
    type: BINARY
    transparency: chroma_key
interval:
  - interval: 1s
    then:
      - lambda: |-
          id(inactivity_time) += 1;
          if (id(inactivity_time) > id(screen_saver_time).state && !id(screen_saver).state) {
            id(screen_saver).turn_on();
          }
light:
  - platform: monochromatic
    name: "Backlight"
    output: backlight_pwm
    id: backlight
    default_transition_length: 0s
    restore_mode: ALWAYS_ON
    internal: True
number:
  - platform: template
    name: "Screen Saver Timeout"
    id: screen_saver_time
    icon: "mdi:screen-rotation-lock"
    entity_category: config
    optimistic: true
    min_value: 10
    max_value: 300
    step: 10
    unit_of_measurement: "s"
    restore_value: true
    initial_value: 60
    mode: box
  - platform: template
    name: "Step - Volume"
    id: volume_step
    icon: "mdi:knob"
    entity_category: config
    optimistic: true
    min_value: 1
    max_value: 10
    step: 1
    unit_of_measurement: "%"
    restore_value: true
    initial_value: 2
    mode: box
  - platform: template
    name: "Step - Bass"
    id: bass_step
    icon: "mdi:equalizer"
    entity_category: config
    optimistic: true
    min_value: 0.5
    max_value: 3.0
    step: 0.5
    unit_of_measurement: "dB"
    restore_value: true
    initial_value: 1.0
    mode: box
  - platform: template
    name: "Step - Light"
    id: light_step
    icon: "mdi:lightbulb"
    entity_category: config
    optimistic: true
    min_value: 1
    max_value: 10
    step: 1
    unit_of_measurement: "%"
    restore_value: true
    initial_value: 2
    mode: box
  - platform: template
    name: "Touch Debounce"
    id: debounce_delay
    icon: "mdi:timer-outline"
    entity_category: config
    optimistic: true
    min_value: 50
    max_value: 500
    step: 25
    unit_of_measurement: "ms"
    restore_value: true
    initial_value: 150
    mode: box
  - platform: template
    name: "Brightness - Screen"
    id: screen_brightness
    icon: "mdi:brightness-7"
    entity_category: config
    optimistic: true
    min_value: 10
    max_value: 100
    step: 5
    unit_of_measurement: "%"
    restore_value: true
    initial_value: 100
    on_value:
      then:
        - if:
            condition:
              and:
                - light.is_on: backlight
                - not:
                    display.is_displaying_page: locked_screen
            then:
              - light.turn_on:
                  id: backlight
                  brightness: !lambda 'return x / 100.0f;'
  - platform: template
    name: "Brightness - Screensaver"
    id: screensaver_brightness
    icon: "mdi:brightness-4"
    entity_category: config
    optimistic: true
    min_value: 5
    max_value: 100
    step: 5
    unit_of_measurement: "%"
    restore_value: true
    initial_value: 50
    on_value:
      then:
        - if:
            condition:
              display.is_displaying_page: locked_screen
            then:
              - light.turn_on:
                  id: backlight
                  brightness: !lambda 'return x / 100.0f;'

  - platform: axp2101
    axp2101_id: axp2101_component
    backlight:
      name: "PMIC Backlight"
      id: axp_backlight
      internal: true

# Backlight: routed to AXP2101 DLDO1 instead of PWM pin
output:
  - platform: template
    id: backlight_pwm
    type: float
    write_action:
      - number.set:
          id: axp_backlight
          value: !lambda 'return state * 100.0;'

  # LCD reset line via AW9523 Port 1, Pin 1 (active-LOW: HIGH = normal, LOW = reset)
  # mipi_spi cannot use AW9523 pins as reset_pin directly — we control it manually.
  - platform: gpio
    id: lcd_reset
    pin:
      aw9523: aw9523_component
      port: 1
      pin: 1

  # Touch controller (FT6336U) reset via AW9523 Port 0, Pin 5 (active-LOW)
  - platform: gpio
    id: touch_reset
    pin:
      aw9523: aw9523_component
      port: 0
      pin: 5

sensor:
  - platform: axp2101
    axp2101_id: axp2101_component
    battery_level:
      name: "${friendly_name} Battery Level"
      id: "cores3_batterylevel"
      # Suppress "no battery" noise — AXP2101 reports NaN / 0 when no cell is connected
      filters:
        - lambda: |-
            if (isnan(x) || x <= 0) return {};
            return x;


  - platform: homeassistant
    id: media_player_volume
    entity_id: ${media_player}
    attribute: volume_level
    internal: true
    filters:
      - lambda: |-
          if (isnan(x)) { return 0; }
          else { return x; }
    on_value:
      then:
        - lambda: |-
            id(volume_level) = x;
  - platform: homeassistant
    id: media_player_volume_2
    entity_id: ${media_player_2}
    attribute: volume_level
    internal: true
    filters:
      - lambda: |-
          if (isnan(x)) { return 0; }
          else { return x; }
    on_value:
      then:
        - lambda: |-
            id(volume_level_2) = x;
  - platform: homeassistant
    id: bass_value
    entity_id: ${bass_entity}
    internal: true
    filters:
      - lambda: |-
          if (isnan(x)) { return 0; }
          else { return x; }
    on_value:
      then:
        - lambda: |-
            id(bass_level) = x;
  - platform: homeassistant
    id: light_brightness_ha
    entity_id: ${light_entity}
    attribute: brightness
    internal: true
    filters:
      - lambda: |-
          if (isnan(x)) { return 0; }
          else { return x / 255.0; }
    on_value:
      then:
        - lambda: |-
            id(light_brightness) = x;

# SPI: MOSI=GPIO37, CLK=GPIO36 (CoreS3 display bus)
spi:
  id: spi_bus
  mosi_pin: GPIO37
  clk_pin: GPIO36

switch:
  - platform: template
    name: "Display"
    id: dial_display
    icon: "mdi:fit-to-screen"
    optimistic: true
    restore_mode: 'always_on'
    on_turn_on:
      # Disable screensaver so the idle timer can fire again next time
      - switch.turn_off: screen_saver
      - light.turn_on:
          id: backlight
          brightness: !lambda 'return id(screen_brightness).state / 100.0f;'
      - lambda: |-
          id(inactivity_time) = 0;
    on_turn_off:
      - light.turn_off: backlight
      - display.page.show: volume_control
  - platform: template
    name: "Screen Saver"
    id: screen_saver
    icon: "mdi:screen-rotation-lock"
    optimistic: true
    restore_mode: 'always_off'
    internal: true
    on_turn_on:
      - light.turn_on:
          id: backlight
          brightness: !lambda 'return id(screensaver_brightness).state / 100.0f;'
      - display.page.show: locked_screen
  - platform: template
    name: "Flip Screen"
    id: flip_screen
    icon: "mdi:screen-rotation"
    entity_category: config
    optimistic: true
    restore_mode: 'restore_default_off'
    on_turn_on:
      - lambda: |-
          id(main_display).set_rotation(display::DISPLAY_ROTATION_180_DEGREES);
    on_turn_off:
      - lambda: |-
          id(main_display).set_rotation(display::DISPLAY_ROTATION_0_DEGREES);

text_sensor:
  - platform: homeassistant
    id: media_player_state
    entity_id: ${media_player}
    internal: true
  - platform: homeassistant
    id: media_player_muted
    entity_id: ${media_player}
    attribute: is_volume_muted
    internal: true
    on_value:
      then:
        - lambda: |-
            id(is_muted_1) = (x == "True" || x == "true" || x == "on");
  - platform: homeassistant
    id: media_player_title
    entity_id: ${media_player}
    attribute: media_title
    internal: true
  - platform: homeassistant
    id: media_player_artist
    entity_id: ${media_player}
    attribute: media_artist
    internal: true
  - platform: homeassistant
    id: media_player_state_2
    entity_id: ${media_player_2}
    internal: true
  - platform: homeassistant
    id: media_player_muted_2
    entity_id: ${media_player_2}
    attribute: is_volume_muted
    internal: true
    on_value:
      then:
        - lambda: |-
            id(is_muted_2) = (x == "True" || x == "true" || x == "on");
  - platform: homeassistant
    id: media_player_title_2
    entity_id: ${media_player_2}
    attribute: media_title
    internal: true
  - platform: homeassistant
    id: media_player_artist_2
    entity_id: ${media_player_2}
    attribute: media_artist
    internal: true
  - platform: homeassistant
    id: light_state
    entity_id: ${light_entity}
    internal: true
  - platform: homeassistant
    id: media_player_source
    entity_id: ${media_player}
    attribute: source
    internal: true
  - platform: homeassistant
    id: media_player_group_members
    entity_id: ${media_player}
    attribute: group_members
    internal: true
  - platform: homeassistant
    id: active_scene_state
    entity_id: ${active_scene_helper}
    internal: true
    on_value:
      then:
        - lambda: |-
            ESP_LOGI("scene", "Active scene changed: '%s'", x.c_str());
            if (x == "vinyl")      id(last_active_scene) = 2;
            else if (x == "chill") id(last_active_scene) = 3;
            else                   id(last_active_scene) = 0;

time:
  - platform: homeassistant
    id: esptime
# Touch controller: CoreS3 uses FT3236 via I2C for touchscreen input.
# Display: ILI9342C 320x240 via SPI
# CS=GPIO3, DC=GPIO35, RST via AW9523 port1 pin1
display:
  - platform: mipi_spi
    model: M5CORE2
    id: main_display
    cs_pin: GPIO3
    dc_pin:
      number: GPIO35
      ignore_pin_validation_error: true  # GPIO35 PSRAM warning on S3 is benign for CoreS3
    # reset_pin is controlled via lcd_reset output (AW9523 P1.1) in on_boot — see above.
    invert_colors: true
    rotation: 0
    buffer_size: 15%
    pages:
      # Screensaver / lock screen
      - id: locked_screen
        lambda: |-
          it.fill(id(background_color));
          // Time centred on the wider 320 px screen
          auto now = id(esptime).now();
          if (now.is_valid()) {
            it.strftime(160, 68, id(volume_font), id(color_white), TextAlign::CENTER, "%H:%M", now);
          }
          // Left column: Living Room  (centre x=80)
          bool muted_lr = id(is_muted_1);
          int vol_lr = (int)(id(volume_level) * 100);
          auto lr_color = muted_lr ? id(color_muted) : id(color_accent);
          it.image(60, 105, muted_lr ? id(mute_icon) : id(speaker_icon), lr_color);
          if (muted_lr) {
            it.printf(80, 153, id(small_font), lr_color, TextAlign::CENTER, "MUTE");
          } else {
            it.printf(80, 153, id(secondary), lr_color, TextAlign::CENTER, "%d%%", vol_lr);
          }
          it.printf(80, 171, id(small_font), id(color_dim), TextAlign::CENTER, "${media_player_name}");
          // Right column: Madagascar  (centre x=240)
          bool muted_mdg = id(is_muted_2);
          int vol_mdg = (int)(id(volume_level_2) * 100);
          auto mdg_color = muted_mdg ? id(color_muted) : id(color_accent);
          it.image(220, 105, muted_mdg ? id(mute_icon) : id(speaker_icon), mdg_color);
          if (muted_mdg) {
            it.printf(240, 153, id(small_font), mdg_color, TextAlign::CENTER, "MUTE");
          } else {
            it.printf(240, 153, id(secondary), mdg_color, TextAlign::CENTER, "%d%%", vol_mdg);
          }
          it.printf(240, 171, id(small_font), id(color_dim), TextAlign::CENTER, "${media_player_2_name}");
          // Source (bottom-left) and group status (bottom-right)
          {
            std::string src = id(media_player_source).has_state() ? id(media_player_source).state : "";
            const char* src_label = (src == "${tv_source}") ? "TV" :
                                    (src == "${line_in_source}") ? "${line_in_select}" : src.c_str();
            auto src_color = (src == "${line_in_source}") ? id(color_warm) :
                             (src == "${tv_source}") ? id(color_accent) : id(color_dim);
            it.printf(80, 197, id(small_font), src_color, TextAlign::CENTER, "%s", src_label);
            bool is_grouped = id(media_player_group_members).has_state() &&
              id(media_player_group_members).state.find("${media_player_2}") != std::string::npos;
            it.printf(240, 197, id(small_font),
              is_grouped ? id(color_playing) : id(color_dim),
              TextAlign::CENTER, is_grouped ? "Grouped" : "Solo");
          }
      # Volume control page 1
      - id: volume_control
        lambda: |-
          it.fill(id(background_color));
          int vol_pct = (int)(id(volume_level) * 100);
          bool is_muted = id(is_muted_1);
          if (is_muted) {
            it.image(140, 44, id(mute_icon), id(color_muted));
          } else {
            it.image(140, 44, id(speaker_icon), id(color_accent));
          }
          it.printf(160, 32, id(small_font), id(color_dim), TextAlign::CENTER, "${media_player_name}");
          if (is_muted) {
            it.printf(160, 120, id(volume_font), id(color_muted), TextAlign::CENTER, "MUTE");
          } else {
            it.printf(160, 120, id(volume_font), id(color_white), TextAlign::CENTER, "%d%%", vol_pct);
          }
          // Arc progress bar (see m5cores3_helpers.h)
          draw_arc(it, is_muted ? 0.0f : id(volume_level), id(color_accent), id(color_arc_bg));
          // Media state indicator
          if (id(media_player_state).has_state()) {
            std::string state = id(media_player_state).state;
            if (state == "playing") {
              it.image(145, 178, id(play_icon), id(color_playing));
            } else if (state == "paused") {
              it.image(145, 178, id(pause_icon), id(color_dim));
            }
          }
          if (id(media_player_title).has_state() && id(media_player_title).state.length() > 0) {
            std::string title = id(media_player_title).state;
            if (title.length() > 24) title = title.substr(0, 22) + "..";
            it.printf(160, 206, id(small_font), id(color_white), TextAlign::CENTER, "%s", title.c_str());
          }
          if (id(media_player_artist).has_state() && id(media_player_artist).state.length() > 0) {
            std::string artist = id(media_player_artist).state;
            if (artist.length() > 26) artist = artist.substr(0, 24) + "..";
            it.printf(160, 220, id(small_font), id(color_dim), TextAlign::CENTER, "%s", artist.c_str());
          }
          draw_chrome(it, id(current_page), 5, id(color_accent), id(color_dim), id(chevron_left_icon), id(chevron_right_icon));
      # Volume control page 2
      - id: volume_control_2
        lambda: |-
          it.fill(id(background_color));
          int vol_pct = (int)(id(volume_level_2) * 100);
          bool is_muted = id(is_muted_2);
          if (is_muted) {
            it.image(140, 44, id(mute_icon), id(color_muted));
          } else {
            it.image(140, 44, id(speaker_icon), id(color_accent));
          }
          it.printf(160, 32, id(small_font), id(color_dim), TextAlign::CENTER, "${media_player_2_name}");
          if (is_muted) {
            it.printf(160, 120, id(volume_font), id(color_muted), TextAlign::CENTER, "MUTE");
          } else {
            it.printf(160, 120, id(volume_font), id(color_white), TextAlign::CENTER, "%d%%", vol_pct);
          }
          draw_arc(it, is_muted ? 0.0f : id(volume_level_2), id(color_accent), id(color_arc_bg));
          if (id(media_player_state_2).has_state()) {
            std::string state = id(media_player_state_2).state;
            if (state == "playing") {
              it.image(145, 178, id(play_icon), id(color_playing));
            } else if (state == "paused") {
              it.image(145, 178, id(pause_icon), id(color_dim));
            }
          }
          if (id(media_player_title_2).has_state() && id(media_player_title_2).state.length() > 0) {
            std::string title = id(media_player_title_2).state;
            if (title.length() > 24) title = title.substr(0, 22) + "..";
            it.printf(160, 206, id(small_font), id(color_white), TextAlign::CENTER, "%s", title.c_str());
          }
          if (id(media_player_artist_2).has_state() && id(media_player_artist_2).state.length() > 0) {
            std::string artist = id(media_player_artist_2).state;
            if (artist.length() > 26) artist = artist.substr(0, 24) + "..";
            it.printf(160, 220, id(small_font), id(color_dim), TextAlign::CENTER, "%s", artist.c_str());
          }
          draw_chrome(it, id(current_page), 5, id(color_accent), id(color_dim), id(chevron_left_icon), id(chevron_right_icon));
      # EQ / Bass control
      - id: eq_control
        lambda: |-
          it.fill(id(background_color));
          it.image(140, 44, id(eq_icon), id(color_eq));
          it.printf(160, 32, id(small_font), id(color_dim), TextAlign::CENTER, "Bass");
          it.printf(160, 120, id(volume_font), id(color_white), TextAlign::CENTER, "%.0f", id(bass_level));
          it.printf(160, 155, id(small_font), id(color_eq), TextAlign::CENTER, "dB");
          // Bass progress bar (-12..+12 normalised to 0..1)
          draw_arc(it, (id(bass_level) + 12.0f) / 24.0f, id(color_eq), id(color_arc_bg));
          draw_chrome(it, id(current_page), 5, id(color_eq), id(color_dim), id(chevron_left_icon), id(chevron_right_icon));
      # Light brightness control
      - id: light_control
        lambda: |-
          it.fill(id(background_color));
          bool is_on = id(light_state).has_state() && id(light_state).state == "on";
          int bright_pct = (int)(id(light_brightness) * 100);
          if (is_on) {
            it.image(140, 44, id(light_icon), id(color_warm));
          } else {
            it.image(140, 44, id(light_off_icon), id(color_dim));
          }
          it.printf(160, 32, id(small_font), id(color_dim), TextAlign::CENTER, "Light");
          if (is_on) {
            it.printf(160, 120, id(volume_font), id(color_white), TextAlign::CENTER, "%d%%", bright_pct);
          } else {
            it.printf(160, 120, id(volume_font), id(color_dim), TextAlign::CENTER, "OFF");
          }
          draw_arc(it, is_on ? id(light_brightness) : 0.0f, id(color_warm), id(color_arc_bg));
          it.printf(160, 206, id(small_font), id(color_dim), TextAlign::CENTER, "Tap center to toggle");
          draw_chrome(it, id(current_page), 5, id(color_warm), id(color_dim), id(chevron_left_icon), id(chevron_right_icon));
      # Actions screen
      - id: actions_screen
        lambda: |-
          it.fill(id(background_color));
          it.printf(160, 20, id(small_font), id(color_dim), TextAlign::CENTER, "Actions");
          // Cross divider centred at (160, 120)
          it.line(40,  120, 280, 120, id(color_dim));
          it.line(160,  40, 160, 200, id(color_dim));
          // Top-left: Line In / TV toggle  (icon centre ~80, 70)
          {
            bool on_line_in = id(media_player_source).has_state() && id(media_player_source).state == "${line_in_source}";
            bool on_tv = id(media_player_source).has_state() && id(media_player_source).state == "${tv_source}";
            auto tl_color = (id(actions_last_tapped) == 0) ? id(color_warm) :
                            (on_line_in ? id(color_warm) : (on_tv ? id(color_accent) : id(color_dim)));
            it.image(58, 48, id(line_in_icon), tl_color);
          }
          // Top-right: Group toggle  (icon centre ~240, 70)
          {
            bool is_grouped = id(media_player_group_members).has_state() &&
                id(media_player_group_members).state.find("${media_player_2}") != std::string::npos;
            auto tr_color = (id(actions_last_tapped) == 1) ? id(color_playing) :
                            (is_grouped ? id(color_playing) : id(color_dim));
            it.image(218, 48, id(group_icon), tr_color);
          }
          // Bottom-left: Vinyl  (icon centre ~80, 170)
          {
            bool vinyl_active = (id(last_active_scene) == 2);
            auto bl_color = (id(actions_last_tapped) == 2) ? id(color_eq) :
                            (vinyl_active ? id(color_eq) : id(color_dim));
            it.image(58, 148, id(vinyl_icon), bl_color);
          }
          // Bottom-right: Chill  (icon centre ~240, 170)
          {
            bool chill_active = (id(last_active_scene) == 3);
            auto br_color = (id(actions_last_tapped) == 3) ? id(color_accent) :
                            (chill_active ? id(color_accent) : id(color_dim));
            it.image(218, 148, id(chill_icon), br_color);
          }
          draw_chrome(it, id(current_page), 5, id(color_white), id(color_dim), id(chevron_left_icon), id(chevron_right_icon));
