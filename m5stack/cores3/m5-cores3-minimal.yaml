substitutions:
  name: m5stack-cores3
  friendly_name: M5Stack CoreS3

esphome:
  name: ${name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: arduino

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  manual_ip:
    static_ip: 10.69.43.35
    gateway: 10.69.43.1
    subnet: 255.255.255.0
  ap:
    ssid: "CoreS3 Fallback"
    password: !secret m5fallbackpassword

api:
  encryption:
    key: !secret m5cores3encryption

ota:
  - platform: esphome

logger:

captive_portal:

