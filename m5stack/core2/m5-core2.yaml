            else if (x == "chill") id(last_active_scene) = 3;
            else                   id(last_active_scene) = 0;
time:
  # BM8563 RTC (PCF8563-compatible) at 0x51
  - platform: pcf8563
    id: rtctime
    i2c_id: internal_i2c
    address: 0x51
    update_interval: never
  - platform: homeassistant
    id: esptime
    on_time_sync:
      then:
        - pcf8563.write_time:
# Touch controller: FT6336U (FT5x06-compatible), interrupt on GPIO39
touchscreen:
  - platform: ft5x06
    id: touchscreen_core2
    i2c_id: internal_i2c
    address: 0x38
    interrupt_pin: GPIO39
# Display: ILI9342C 320x240 via SPI — CS=GPIO5, DC=GPIO15
# Reset is managed by the AXP192 chip (no reset_pin needed here).
display:
  - platform: ili9xxx
    model: M5STACK
    id: main_display
    cs_pin: GPIO5
    dc_pin: GPIO15
    update_interval: 1s
    data_rate: 40MHz
    invert_colors: false
    pages:
      # Screensaver / lock screen
      - id: locked_screen
        lambda: |-
          it.fill(id(background_color));
          // Time centred on the wider 320 px screen
          auto now = id(esptime).now();
          if (now.is_valid()) {
            it.strftime(160, 68, id(volume_font), id(color_white), TextAlign::CENTER, "%H:%M", now);
          }
          // Left column: Living Room  (centre x=80)
          bool muted_lr = id(is_muted_1);
          int vol_lr = (int)(id(volume_level) * 100);
          auto lr_color = muted_lr ? id(color_muted) : id(color_accent);
          it.image(60, 105, muted_lr ? id(mute_icon) : id(speaker_icon), lr_color);
          if (muted_lr) {
            it.printf(80, 153, id(small_font), lr_color, TextAlign::CENTER, "MUTE");
          } else {
            it.printf(80, 153, id(secondary), lr_color, TextAlign::CENTER, "%d%%", vol_lr);
          }
          it.printf(80, 171, id(small_font), id(color_dim), TextAlign::CENTER, "${media_player_name}");
          // Right column: Madagascar  (centre x=240)
          bool muted_mdg = id(is_muted_2);
          int vol_mdg = (int)(id(volume_level_2) * 100);
          auto mdg_color = muted_mdg ? id(color_muted) : id(color_accent);
          it.image(220, 105, muted_mdg ? id(mute_icon) : id(speaker_icon), mdg_color);
          if (muted_mdg) {
            it.printf(240, 153, id(small_font), mdg_color, TextAlign::CENTER, "MUTE");
          } else {
            it.printf(240, 153, id(secondary), mdg_color, TextAlign::CENTER, "%d%%", vol_mdg);
          }
          it.printf(240, 171, id(small_font), id(color_dim), TextAlign::CENTER, "${media_player_2_name}");
          // Source (bottom-left) and group status (bottom-right)
          {
            std::string src = id(media_player_source).has_state() ? id(media_player_source).state : "";
            const char* src_label = (src == "${tv_source}") ? "TV" :
                                    (src == "${line_in_source}") ? "${line_in_select}" : src.c_str();
            auto src_color = (src == "${line_in_source}") ? id(color_warm) :
                             (src == "${tv_source}") ? id(color_accent) : id(color_dim);
            it.printf(80, 197, id(small_font), src_color, TextAlign::CENTER, "%s", src_label);
            bool is_grouped = id(media_player_group_members).has_state() &&
              id(media_player_group_members).state.find("${media_player_2}") != std::string::npos;
            it.printf(240, 197, id(small_font),
              is_grouped ? id(color_playing) : id(color_dim),
              TextAlign::CENTER, is_grouped ? "Grouped" : "Solo");
          }
      # Volume control page 1
      - id: volume_control
        lambda: |-
          it.fill(id(background_color));
          int vol_pct = (int)(id(volume_level) * 100);
          bool is_muted = id(is_muted_1);
          if (is_muted) {
            it.image(140, 44, id(mute_icon), id(color_muted));
          } else {
            it.image(140, 44, id(speaker_icon), id(color_accent));
          }
          it.printf(160, 32, id(small_font), id(color_dim), TextAlign::CENTER, "${media_player_name}");
          if (is_muted) {
            it.printf(160, 120, id(volume_font), id(color_muted), TextAlign::CENTER, "MUTE");
          } else {
            it.printf(160, 120, id(volume_font), id(color_white), TextAlign::CENTER, "%d%%", vol_pct);
          }
          // Horizontal progress bar (draw_arc is repurposed in m5core2_helpers.h)
          draw_arc(it, is_muted ? 0.0f : id(volume_level), id(color_accent), id(color_arc_bg));
          // Media state indicator
          if (id(media_player_state).has_state()) {
            std::string state = id(media_player_state).state;
            if (state == "playing") {
              it.image(145, 178, id(play_icon), id(color_playing));
            } else if (state == "paused") {
              it.image(145, 178, id(pause_icon), id(color_dim));
            }
          }
          if (id(media_player_title).has_state() && id(media_player_title).state.length() > 0) {
            std::string title = id(media_player_title).state;
            if (title.length() > 24) title = title.substr(0, 22) + "..";
            it.printf(160, 206, id(small_font), id(color_white), TextAlign::CENTER, "%s", title.c_str());
          }
          if (id(media_player_artist).has_state() && id(media_player_artist).state.length() > 0) {
            std::string artist = id(media_player_artist).state;
            if (artist.length() > 26) artist = artist.substr(0, 24) + "..";
            it.printf(160, 220, id(small_font), id(color_dim), TextAlign::CENTER, "%s", artist.c_str());
          }
          draw_chrome(it, id(current_page), 5, id(color_accent), id(color_dim), id(chevron_left_icon), id(chevron_right_icon));
      # Volume control page 2
      - id: volume_control_2
        lambda: |-
          it.fill(id(background_color));
          int vol_pct = (int)(id(volume_level_2) * 100);
          bool is_muted = id(is_muted_2);
          if (is_muted) {
            it.image(140, 44, id(mute_icon), id(color_muted));
          } else {
            it.image(140, 44, id(speaker_icon), id(color_accent));
          }
          it.printf(160, 32, id(small_font), id(color_dim), TextAlign::CENTER, "${media_player_2_name}");
          if (is_muted) {
            it.printf(160, 120, id(volume_font), id(color_muted), TextAlign::CENTER, "MUTE");
          } else {
            it.printf(160, 120, id(volume_font), id(color_white), TextAlign::CENTER, "%d%%", vol_pct);
          }
          draw_arc(it, is_muted ? 0.0f : id(volume_level_2), id(color_accent), id(color_arc_bg));
          if (id(media_player_state_2).has_state()) {
            std::string state = id(media_player_state_2).state;
            if (state == "playing") {
              it.image(145, 178, id(play_icon), id(color_playing));
            } else if (state == "paused") {
              it.image(145, 178, id(pause_icon), id(color_dim));
            }
          }
          if (id(media_player_title_2).has_state() && id(media_player_title_2).state.length() > 0) {
            std::string title = id(media_player_title_2).state;
            if (title.length() > 24) title = title.substr(0, 22) + "..";
            it.printf(160, 206, id(small_font), id(color_white), TextAlign::CENTER, "%s", title.c_str());
          }
          if (id(media_player_artist_2).has_state() && id(media_player_artist_2).state.length() > 0) {
            std::string artist = id(media_player_artist_2).state;
            if (artist.length() > 26) artist = artist.substr(0, 24) + "..";
            it.printf(160, 220, id(small_font), id(color_dim), TextAlign::CENTER, "%s", artist.c_str());
          }
          draw_chrome(it, id(current_page), 5, id(color_accent), id(color_dim), id(chevron_left_icon), id(chevron_right_icon));
      # EQ / Bass control
      - id: eq_control
        lambda: |-
          it.fill(id(background_color));
          it.image(140, 44, id(eq_icon), id(color_eq));
          it.printf(160, 32, id(small_font), id(color_dim), TextAlign::CENTER, "Bass");
          it.printf(160, 120, id(volume_font), id(color_white), TextAlign::CENTER, "%.0f", id(bass_level));
          it.printf(160, 155, id(small_font), id(color_eq), TextAlign::CENTER, "dB");
          // Bass progress bar (-12..+12 normalised to 0..1)
          draw_arc(it, (id(bass_level) + 12.0f) / 24.0f, id(color_eq), id(color_arc_bg));
          draw_chrome(it, id(current_page), 5, id(color_eq), id(color_dim), id(chevron_left_icon), id(chevron_right_icon));
      # Light brightness control
      - id: light_control
        lambda: |-
          it.fill(id(background_color));
          bool is_on = id(light_state).has_state() && id(light_state).state == "on";
          int bright_pct = (int)(id(light_brightness) * 100);
          if (is_on) {
            it.image(140, 44, id(light_icon), id(color_warm));
          } else {
            it.image(140, 44, id(light_off_icon), id(color_dim));
          }
          it.printf(160, 32, id(small_font), id(color_dim), TextAlign::CENTER, "Light");
          if (is_on) {
            it.printf(160, 120, id(volume_font), id(color_white), TextAlign::CENTER, "%d%%", bright_pct);
          } else {
            it.printf(160, 120, id(volume_font), id(color_dim), TextAlign::CENTER, "OFF");
          }
          draw_arc(it, is_on ? id(light_brightness) : 0.0f, id(color_warm), id(color_arc_bg));
          it.printf(160, 206, id(small_font), id(color_dim), TextAlign::CENTER, "Btn B to toggle");
          draw_chrome(it, id(current_page), 5, id(color_warm), id(color_dim), id(chevron_left_icon), id(chevron_right_icon));
      # Actions screen
      - id: actions_screen
        lambda: |-
          it.fill(id(background_color));
          it.printf(160, 20, id(small_font), id(color_dim), TextAlign::CENTER, "Actions");
          // Cross divider centred at (160, 120)
          it.line(40,  120, 280, 120, id(color_dim));
          it.line(160,  40, 160, 200, id(color_dim));
          // Top-left: Line In / TV toggle  (icon centre ~80, 70)
          {
            bool on_line_in = id(media_player_source).has_state() && id(media_player_source).state == "${line_in_source}";
            bool on_tv = id(media_player_source).has_state() && id(media_player_source).state == "${tv_source}";
            auto tl_color = (id(actions_last_tapped) == 0) ? id(color_warm) :
                            (on_line_in ? id(color_warm) : (on_tv ? id(color_accent) : id(color_dim)));
            it.image(58, 48, id(line_in_icon), tl_color);
          }
          // Top-right: Group toggle  (icon centre ~240, 70)
          {
            bool is_grouped = id(media_player_group_members).has_state() &&
                id(media_player_group_members).state.find("${media_player_2}") != std::string::npos;
            auto tr_color = (id(actions_last_tapped) == 1) ? id(color_playing) :
                            (is_grouped ? id(color_playing) : id(color_dim));
            it.image(218, 48, id(group_icon), tr_color);
          }
          // Bottom-left: Vinyl  (icon centre ~80, 170)
          {
            bool vinyl_active = (id(last_active_scene) == 2);
            auto bl_color = (id(actions_last_tapped) == 2) ? id(color_eq) :
                            (vinyl_active ? id(color_eq) : id(color_dim));
            it.image(58, 148, id(vinyl_icon), bl_color);
          }
          // Bottom-right: Chill  (icon centre ~240, 170)
          {
            bool chill_active = (id(last_active_scene) == 3);
            auto br_color = (id(actions_last_tapped) == 3) ? id(color_accent) :
                            (chill_active ? id(color_accent) : id(color_dim));
            it.image(218, 148, id(chill_icon), br_color);
          }
          draw_chrome(it, id(current_page), 5, id(color_white), id(color_dim), id(chevron_left_icon), id(chevron_right_icon));
