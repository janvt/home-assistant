    initial_value: 50
    on_value:
      then:
        - if:
            condition:
              display.is_displaying_page: locked_screen
            then:
              - light.turn_on:
                  id: backlight
                  brightness: !lambda 'return x / 100.0f;'
# Backlight via AXP192 — raw I2C writes (no axp192 component needed)
# LDO3 controls the LCD backlight.  Register 0x28, bits [3:0]:
#   voltage = 1.8 V + n * 0.1 V   (n = 0–15, so 1.8 V – 3.3 V)
# We map brightness 0.0–1.0 → LDO3 0–12  (1.8 V – 3.0 V).
# Bits [7:4] are LDO2 and are kept at 0xF (3.3 V, LCD power rail).
output:
  - platform: template
    id: backlight_pwm
    type: float
    write_action:
      - lambda: |-
          uint8_t vol = (uint8_t)(state * 12.0f);
          if (vol > 12) vol = 12;
          uint8_t d[] = {0x28, (uint8_t)(0xF0 | (vol & 0x0F))};
          id(internal_i2c)->write(0x34, d, 2);
sensor:
  # No rotary encoder on Core2 — value adjustment is done via screen touch zones.
  - platform: homeassistant
    id: media_player_volume
    entity_id: ${media_player}
    attribute: volume_level
    internal: true
    filters:
      - lambda: |-
          if (isnan(x)) { return 0; }
          else { return x; }
    on_value:
      then:
        - lambda: |-
            id(volume_level) = x;
  - platform: homeassistant
    id: media_player_volume_2
    entity_id: ${media_player_2}
    attribute: volume_level
    internal: true
    filters:
      - lambda: |-
          if (isnan(x)) { return 0; }
          else { return x; }
    on_value:
      then:
        - lambda: |-
            id(volume_level_2) = x;
  - platform: homeassistant
    id: bass_value
    entity_id: ${bass_entity}
    internal: true
    filters:
      - lambda: |-
          if (isnan(x)) { return 0; }
          else { return x; }
    on_value:
      then:
        - lambda: |-
            id(bass_level) = x;
  - platform: homeassistant
    id: light_brightness_ha
    entity_id: ${light_entity}
    attribute: brightness
    internal: true
    filters:
      - lambda: |-
          if (isnan(x)) { return 0; }
          else { return x / 255.0; }
    on_value:
      then:
        - lambda: |-
            id(light_brightness) = x;
# SPI: MOSI=GPIO23, CLK=GPIO18  (Core2 display bus)
spi:
  id: spi_bus
  mosi_pin: GPIO23
  clk_pin: GPIO18
switch:
  - platform: template
    name: "Display"
    id: dial_display
    icon: "mdi:fit-to-screen"
    optimistic: true
    restore_mode: 'always_on'
    on_turn_on:
      - light.turn_on:
          id: backlight
          brightness: !lambda 'return id(screen_brightness).state / 100.0f;'
      - lambda: |-
          id(inactivity_time) = 0;
    on_turn_off:
      - light.turn_off: backlight
      - display.page.show: volume_control
  - platform: template
    name: "Screen Saver"
    id: screen_saver
    icon: "mdi:screen-rotation-lock"
    optimistic: true
    restore_mode: 'always_off'
    internal: true
    on_turn_on:
      - light.turn_on:
          id: backlight
          brightness: !lambda 'return id(screensaver_brightness).state / 100.0f;'
      - display.page.show: locked_screen
  - platform: template
    name: "Flip Screen"
    id: flip_screen
    icon: "mdi:screen-rotation"
    entity_category: config
    optimistic: true
    restore_mode: 'restore_default_off'
    on_turn_on:
      - lambda: |-
          id(main_display).set_rotation(display::DISPLAY_ROTATION_180_DEGREES);
    on_turn_off:
      - lambda: |-
          id(main_display).set_rotation(display::DISPLAY_ROTATION_0_DEGREES);
text_sensor:
  - platform: homeassistant
    id: media_player_state
    entity_id: ${media_player}
    internal: true
  - platform: homeassistant
    id: media_player_muted
    entity_id: ${media_player}
    attribute: is_volume_muted
